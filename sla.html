<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch.1 SLA Theory OX Quiz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&family=Caveat:wght@600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f4ee;background-image:repeating-linear-gradient(transparent,transparent 27px,#ddddd0 28px);color:#1a1a1a;min-height:100vh;padding:16px}
.header-wrap{max-width:720px;margin:0 auto;padding:20px 8px 0}
.header-topbar{display:flex;justify-content:space-between;align-items:center;border-top:2px solid #1a1a1a;padding-top:8px;margin-bottom:10px}
.header-no{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;border:2px solid #1a1a1a;padding:3px 10px;border-radius:2px;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.header-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:#888;letter-spacing:1px}
.header-title{font-size:clamp(30px,7vw,46px);font-weight:900;color:#1a1a1a;line-height:1.1;margin-bottom:5px;letter-spacing:-1px}
.title-hl{background:#2e7d52;color:#fff;padding:1px 6px}
.header-script{font-family:'Caveat',cursive;font-size:21px;color:#2e7d52;margin-bottom:4px;font-weight:600}
.header-sub{font-size:13px;color:#555;text-decoration:underline;text-underline-offset:4px;text-decoration-color:#aaa;margin-bottom:14px}
.header-divider{border:none;border-top:2.5px solid #1a1a1a;margin-bottom:20px}
.prog-wrap{max-width:720px;margin:0 auto 24px;padding:0 8px}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:#4a7a62;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.bar{height:4px;background:#b2dfcc;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#2e7d52,#26a69a);border-radius:2px;transition:width .5s ease}
.wrap{max-width:720px;margin:0 auto}
.card{background:#fff;border:1.5px solid #b2dfcc;border-radius:14px;padding:26px;animation:up .35s ease;box-shadow:0 2px 8px rgba(46,125,82,.08)}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.q-meta{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.q-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:#2e7d52;background:rgba(46,125,82,.1);padding:3px 10px;border-radius:8px;font-weight:700}
.q-src{font-size:11px;color:#4a7a62;font-family:'JetBrains Mono',monospace}
.q-cat{font-size:11px;color:#00796b;background:rgba(38,166,154,.1);padding:3px 10px;border-radius:8px;margin-left:auto;font-weight:600}
.kw1{background:rgba(46,125,82,.15);color:#1b5e3a;padding:2px 7px;border-radius:4px;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.88em;border:1px solid rgba(46,125,82,.25)}
.kw2{color:#00796b;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.88em;border-bottom:2px solid rgba(0,121,107,.45)}
.kw3{background:rgba(230,119,0,.13);color:#bf6000;padding:2px 7px;border-radius:4px;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.88em;border:1px solid rgba(230,119,0,.3)}
.kw4{background:rgba(183,28,28,.11);color:#b71c1c;padding:2px 7px;border-radius:4px;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.88em;border:1px solid rgba(183,28,28,.25)}
.q-text{font-size:clamp(15px,2.2vw,16.5px);line-height:1.9;margin-bottom:24px;color:#1a3326}
.ox-btns{display:flex;gap:12px}
.ox-btn{flex:1;padding:20px 10px;border-radius:12px;border:2px solid #b2dfcc;background:#f5fdf8;color:#1a3326;font-size:30px;cursor:pointer;transition:all .18s ease;display:flex;flex-direction:column;align-items:center;gap:5px}
.lb{font-size:11px;font-family:'JetBrains Mono',monospace;color:#4a7a62;letter-spacing:1px;font-weight:600}
.ox-btn:hover:not(:disabled){transform:translateY(-2px)}
.o-btn:hover:not(:disabled){border-color:#2e7d52;background:rgba(46,125,82,.08)}
.x-btn:hover:not(:disabled){border-color:#c62828;background:rgba(198,40,40,.06)}
.co,.cx{border-color:#2e7d52!important;background:rgba(46,125,82,.1)!important}
.wp{border-color:#c62828!important;background:rgba(198,40,40,.08)!important}
.ox-btn:disabled{cursor:default}
.badge{display:none;margin-top:14px;padding:9px 16px;border-radius:8px;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.badge.ok{display:inline-block;background:rgba(46,125,82,.1);color:#2e7d52;border:1.5px solid rgba(46,125,82,.3)}
.badge.ng{display:inline-block;background:rgba(198,40,40,.08);color:#c62828;border:1.5px solid rgba(198,40,40,.25)}
.exp{display:none;margin-top:18px;border-radius:12px;overflow:hidden;animation:fade .3s ease}
.exp.show{display:block}
@keyframes fade{from{opacity:0}to{opacity:1}}
.exp-header{background:linear-gradient(135deg,rgba(46,125,82,.12),rgba(38,166,154,.06));border:1.5px solid rgba(46,125,82,.25);border-bottom:none;padding:11px 16px}
.exp-header span{font-size:11px;font-family:'JetBrains Mono',monospace;color:#1b5e3a;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.exp-answer{background:rgba(46,125,82,.05);border:1.5px solid rgba(46,125,82,.2);border-top:none;border-bottom:none;padding:14px 16px}
.ans-label{font-size:11px;font-family:'JetBrains Mono',monospace;color:#4a7a62;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}
.ans-text{font-size:15px;color:#1a3326;line-height:1.75;font-weight:500}
.exp-body{background:rgba(46,125,82,.03);border:1.5px solid rgba(46,125,82,.15);border-top:1px solid rgba(46,125,82,.1);padding:14px 16px}
.sec-label{font-size:11px;font-family:'JetBrains Mono',monospace;color:#00796b;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;margin-top:13px;font-weight:700}
.sec-label:first-child{margin-top:0}
.exp-body p{font-size:14px;color:#2a5040;line-height:1.8;margin-bottom:5px}
.def-box{background:rgba(38,166,154,.06);border-left:4px solid #26a69a;padding:10px 14px;border-radius:0 8px 8px 0;margin:8px 0}
.def-box p{color:#004d40;font-size:13.5px;font-style:italic;line-height:1.75}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.compare.three{grid-template-columns:1fr 1fr 1fr}
.compare-item{background:#f5fdf8;border:1.5px solid #b2dfcc;border-radius:8px;padding:11px 14px}
.ci-title{font-size:11px;font-family:'JetBrains Mono',monospace;color:#1b5e3a;font-weight:700;margin-bottom:5px}
.compare-item p{font-size:13px;color:#3a6b51;line-height:1.65}
.next-btn{display:none;width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#2e7d52,#26a69a);border:none;border-radius:10px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .2s}
.next-btn:hover{opacity:.88;transform:translateY(-1px)}
.next-btn.show{display:block;animation:fade .3s ease}
.score-card{display:none;text-align:center;padding:48px 24px}
.score-card.show{display:block;animation:up .5s ease}
.score-circle{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,#2e7d52,#26a69a);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 40px rgba(46,125,82,.3)}
.s-num{font-size:42px;font-weight:700;line-height:1;color:#fff}
.s-total{font-size:14px;opacity:.85;color:#fff}
.score-card h2{font-size:24px;margin-bottom:7px;color:#1a3326}
.score-card p{color:#4a7a62;margin-bottom:24px;font-size:15px}
.restart-btn{padding:13px 32px;background:#f5fdf8;border:2px solid #2e7d52;border-radius:10px;color:#2e7d52;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.restart-btn:hover{background:rgba(46,125,82,.1)}
.nd{width:28px;height:28px;border-radius:6px;border:1.5px solid #b2dfcc;background:#f5fdf8;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;color:#4a7a62;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;font-weight:600}
.nd.cur{border-color:#2e7d52;background:#2e7d52;color:white}
.nd.ok{border-color:#2e7d52;background:rgba(46,125,82,.15);color:#1b5e3a}
.nd.ng{border-color:#c62828;background:rgba(198,40,40,.1);color:#c62828}
.nd:hover:not(.cur){opacity:.7}
#nav{display:flex;flex-wrap:wrap;gap:5px;max-width:720px;margin:0 auto 16px;padding:0 8px}
</style>
</head>
<body>
<div class="header-wrap">
  <div class="header-topbar">
    <span class="header-no">NO. 01 <span>—</span> SLA Theory</span>
    <span class="header-label">Past-Exam Notebook</span>
  </div>
  <h1 class="header-title"><span class="title-hl">기출마스터</span> 전공영어</h1>
  <div class="header-script">Past-Exam Master</div>
  <p class="header-sub">영어학 · SLA Theory · 임용고시 대비</p>
  <div class="header-divider"></div>
</div>
<div class="prog-wrap">
  <div class="prog-info"><span id="pt">1 / 20</span><span id="ps">정답 0개</span></div>
  <div class="bar"><div class="bar-fill" id="bf" style="width:5%"></div></div>
</div>
<div id="rb" style="display:none;max-width:720px;margin:0 auto 14px;padding:0 8px">
  <div style="background:rgba(46,125,82,.08);border:1.5px solid rgba(46,125,82,.3);border-radius:12px;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <span id="rb-msg" style="font-size:13px;color:#1a3326;font-family:'JetBrains Mono',monospace;line-height:1.5"></span>
    <button onclick="freshStart()" style="padding:7px 16px;background:#f5fdf8;border:1.5px solid #b2dfcc;border-radius:8px;color:#4a7a62;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0">처음부터</button>
  </div>
</div>
<div id="nav"></div>
<div class="wrap">
  <div id="qa"></div>
  <div class="score-card" id="sc">
    <div class="score-circle"><span class="s-num" id="fs">0</span><span class="s-total">/20</span></div>
    <h2 id="rm"></h2><p id="rs"></p>
    <button class="restart-btn" onclick="restart()">🔄 다시 풀기</button>
  </div>
</div>
<script>
const Q=[
  // ── 1. Behaviorism ───────────────────────────────────────────────────
  {src:"Behaviorism",cat:"Structuralism / ALM",
   text:"<span class='kw1'>Rote learning</span> involves storing new information by connecting it to existing cognitive structures, which promotes strong retention and meaningful understanding.",
   ans:false,
   correct:"<span class='kw1'>Rote learning</span> involves <span class='kw2'>isolated</span> storage with <span class='kw2'>no association</span> to existing cognitive structure. That is <span class='kw4'>meaningful learning (Subsumption)</span>.",
   why:"Rote learning은 기존 인지 구조와의 연결 없이 개별 항목을 고립적으로 저장하는 방식입니다. 반대로 <span class='kw4'>Meaningful learning (Subsumption)</span>은 새 정보를 기존 인지 구조에 연결·통합하여 강한 retention을 이끌어냅니다.",
   source:"\"<span class='kw1'>Rote learning</span>: a learning type which involves the mental storage of <span class='kw2'>isolated bits and pieces of items having little or no association with existing cognitive structure</span>.\" ↔ <span class='kw4'>Meaningful learning (Subsumption)</span>",
   compare:[{title:"<span class='kw1'>Rote learning</span>",desc:"<span class='kw2'>isolated</span> · no cognitive connection · weak retention"},{title:"<span class='kw4'>Meaningful learning</span>",desc:"<span class='kw2'>anchoring</span> to existing structure · strong retention"}]},

  {src:"Behaviorism",cat:"Pattern Drills",
   text:"In the <span class='kw1'>Audiolingual Method</span>, <span class='kw1'>pattern drills</span> are communicative activities where students use language meaningfully to express their own ideas and opinions.",
   ans:false,
   correct:"<span class='kw1'>Pattern drills</span> in ALM are <span class='kw2'>rote, decontextualized</span> practice — repetition of sounds <span class='kw2'>without understanding of meaning</span>.",
   why:"ALM의 pattern drills는 의미 이해 없이 소리를 반복 연습하는 기계적(rote) 활동입니다. 의미보다 form에 집중하며 habit formation을 목표로 합니다. 이는 communicative activity와 반대되는 개념입니다.",
   source:"\"<span class='kw1'>Pattern drills</span>: a <span class='kw2'>rote, intensive, controlled practice</span> where there is a repetition of sounds by the Ss <span class='kw2'>without the vaguest understanding of what the sound might possibly mean</span>.\"",
   compare:[{title:"<span class='kw1'>Pattern drills (ALM)</span>",desc:"rote · <span class='kw2'>form-focused</span> · no meaning · habit formation"},{title:"<span class='kw3'>Communicative activity</span>",desc:"<span class='kw2'>meaning-focused</span> · authentic purpose · CLT"}]},

  // ── 2. Krashen ──────────────────────────────────────────────────────
  {src:"Krashen's Input Hypothesis",cat:"Acquisition vs Learning",
   text:"According to Krashen's <span class='kw4'>Non-interface position</span>, <span class='kw2'>acquired knowledge</span> and <span class='kw2'>learnt knowledge</span> can be integrated through sufficient practice, eventually allowing learned rules to become acquired.",
   ans:false,
   correct:"<span class='kw4'>Non-interface position</span> states that acquired and learnt knowledge are <span class='kw2'>separated and unrelated</span> — learnt knowledge <span class='kw2'>cannot</span> become acquired knowledge.",
   why:"Krashen의 non-interface position은 acquisition(무의식적, 의미 중심)과 learning(의식적, 형식 중심)이 완전히 분리되어 있다는 입장입니다. 연습을 통해 learnt knowledge가 acquired knowledge로 전환된다는 interface position과 대비됩니다.",
   source:"\"<span class='kw4'>Non-interface position</span>: <span class='kw2'>acquired knowledge and learnt knowledge are separated and unrelated</span>.\"",
   compare:[{title:"<span class='kw4'>Non-interface (Krashen)</span>",desc:"Acquisition ≠ Learning · <span class='kw2'>no transfer</span> between two"},{title:"<span class='kw3'>Interface position (Bialystok)</span>",desc:"Explicit → Implicit <span class='kw2'>through practice</span>"}]},

  {src:"Krashen's Input Hypothesis",cat:"Monitor Hypothesis",
   text:"According to Krashen's <span class='kw4'>Monitor Hypothesis</span>, the monitor functions effectively in all communicative situations, automatically editing output during spontaneous conversation.",
   ans:false,
   correct:"The monitor works only when learners have <span class='kw2'>sufficient time</span>, <span class='kw2'>know the rule</span>, and <span class='kw2'>focus on form/accuracy</span> — not in spontaneous conversation.",
   why:"Monitor의 성공적 작동 3조건: ① sufficient time (규칙 선택·적용 시간) ② know the rule (learning을 통한 규칙 인지) ③ form/accuracy focus. 자발적 대화에서는 이 조건들이 충족되기 어려워 monitor가 효과적으로 작동하지 않습니다.",
   source:"\"<span class='kw4'>Monitor Hypothesis</span>: Conscious learning only functions as a monitor or editor. Successful monitor conditions: <span class='kw2'>sufficient time, know the rule, focus on form/accuracy</span>.\"",
   compare:[{title:"Monitor <span class='kw2'>works well</span>",desc:"writing · planned speech · accuracy focus · enough time"},{title:"Monitor <span class='kw2'>fails</span>",desc:"spontaneous conversation · fluency focus · time pressure"}]},

  {src:"Krashen's Input Hypothesis",cat:"Affective Filter",
   text:"According to Krashen's <span class='kw4'>Affective Filter Hypothesis</span>, learners with high motivation, low anxiety, and high self-esteem have a <span class='kw2'>higher</span> affective filter, which facilitates language acquisition.",
   ans:false,
   correct:"High motivation + low anxiety + high self-esteem = <span class='kw2'>LOWER</span> affective filter → <span class='kw2'>better acquisition</span>. A high filter <span class='kw2'>blocks</span> input.",
   why:"Affective filter는 comprehensible input이 intake로 전환되는 것을 막는 mental block입니다. Filter가 낮을수록(low anxiety, high motivation, high self-esteem) input이 더 잘 흡수됩니다. Filter가 높으면 input이 차단됩니다.",
   source:"\"<span class='kw4'>Affective filter</span>: a <span class='kw2'>mental block which prevents L from fully utilizing the comprehensible input</span>. Best acquisition: <span class='kw2'>low anxiety, absent defensiveness</span>.\"",
   compare:[{title:"<span class='kw2'>Low filter</span> (good)",desc:"low anxiety · high motivation · high self-esteem → acquisition↑"},{title:"<span class='kw2'>High filter</span> (bad)",desc:"high anxiety · low confidence → input blocked"}]},

  // ── 3. Output Hypothesis ────────────────────────────────────────────
  {src:"Swain's Output Hypothesis",cat:"3 Functions of Output",
   text:"<span class='kw4'>Swain's Output Hypothesis</span> argues that output is important because it requires <span class='kw2'>syntactic processing</span>, whereas input only requires <span class='kw2'>semantic processing</span>.",
   ans:true,
   correct:"<span class='kw4'>Output Hypothesis</span>의 핵심 근거: output은 <span class='kw2'>syntactic processing</span>을 요구하고 input은 <span class='kw2'>semantic processing</span>만으로도 이해 가능 → output이 별도의 언어 습득 기제로서 필요합니다.",
   why:"Swain은 Krashen의 input 중심 이론을 비판하며 output의 독자적 역할을 주장했습니다. Output의 3가지 기능: ① noticing/triggering ② hypothesis testing ③ metalinguistic function.",
   source:"\"<span class='kw4'>Output Hypothesis</span>: Output requires <span class='kw2'>syntactic processing</span> while input only requires <span class='kw2'>semantic processing</span>.\"",
   compare:[{title:"<span class='kw3'>Noticing/Triggering</span>",desc:"gap between what S can say and wants to say"},{title:"<span class='kw3'>Hypothesis testing</span>",desc:"try new rules → get feedback → modify"},{title:"<span class='kw3'>Metalinguistic</span>",desc:"reflect on own/others' language production"}]},

  {src:"Swain's Output Hypothesis",cat:"Pushed Output",
   text:"<span class='kw3'>Pushed output</span> refers to comprehensible input that is adjusted to be slightly beyond the learner's current proficiency level (i+1).",
   ans:false,
   correct:"That describes <span class='kw4'>comprehensible input (i+1)</span>. <span class='kw3'>Pushed output</span> = learners are <span class='kw2'>pushed to produce</span> more accurate/complex output than they normally would.",
   why:"Pushed output은 학습자가 평소보다 더 정확하거나 복잡한 output을 생성하도록 push되는 상황을 말합니다. 이는 syntactically more advanced structure 형성을 촉진합니다. i+1은 Krashen의 comprehensible input 개념입니다.",
   source:"\"<span class='kw3'>Pushed output</span> encourages Ls to formulate syntactically slightly more advanced structure.\" / Krashen: \"<span class='kw4'>comprehensible input</span> at i+1 level\"",
   compare:[{title:"<span class='kw4'>Comprehensible input (i+1)</span>",desc:"Krashen · input 측면 · slightly beyond proficiency"},{title:"<span class='kw3'>Pushed output</span>",desc:"Swain · output 측면 · pushed to produce more accurately"}]},

  // ── 4. Noticing Hypothesis ──────────────────────────────────────────
  {src:"Schmidt's Noticing Hypothesis",cat:"Noticing / Noticing the Gap",
   text:"Schmidt's <span class='kw4'>Noticing Hypothesis</span> claims that <span class='kw2'>noticing</span> is an essential prerequisite for input to be converted into <span class='kw2'>intake</span> and integrated into the learner's interlanguage system.",
   ans:true,
   correct:"<span class='kw4'>Noticing Hypothesis</span>의 핵심: <span class='kw2'>noticing</span>이 input → intake 전환의 <span class='kw2'>필수 전제 조건</span>입니다. Noticing 없이는 input이 interlanguage에 통합되지 않습니다.",
   why:"Schmidt은 의식적 주의(noticing)가 input을 intake로 전환하는 데 필수적이라고 주장합니다. Noticing the gap은 학습자가 자신의 interlanguage와 TL을 비교하는 과정으로, corrective feedback(recast)과 dictogloss가 이를 유도합니다.",
   source:"\"<span class='kw4'>Noticing hypothesis</span>: noticing may be an <span class='kw2'>essential prerequisite</span> for input to be converted into <span class='kw2'>intake</span>, and eventually integrated into Ls' interlanguage system.\"",
   compare:[{title:"<span class='kw4'>Noticing</span>",desc:"input → <span class='kw2'>intake</span> 전환의 필수 조건"},{title:"<span class='kw3'>Noticing the gap</span>",desc:"interlanguage vs TL 비교 · recast · dictogloss"}]},

  // ── 5. HIG/LIG ──────────────────────────────────────────────────────
  {src:"Krashen's Criticism",cat:"HIG / LIG",
   text:"According to the criticism of Krashen's input-only view, <span class='kw3'>LIGs (Low Input Generators)</span> outperform <span class='kw3'>HIGs (High Input Generators)</span> in SLA because they receive more carefully processed input.",
   ans:false,
   correct:"<span class='kw3'>HIGs</span> outperform <span class='kw3'>LIGs</span>. HIGs <span class='kw2'>initiate and sustain turns</span>, try out more hypotheses, and convert more input to <span class='kw2'>intake</span>.",
   why:"HIGs(High Input Generators)는 적극적으로 발화하며 다양한 가설을 시험하고 더 많은 input을 intake로 전환합니다. LIGs는 수동적으로 input을 받기만 해 intake 전환율이 낮습니다. 이는 Krashen의 input만으로 충분하다는 주장을 비판하는 근거입니다.",
   source:"\"<span class='kw3'>HIG</span>: Ls who <span class='kw2'>generate high levels of input</span> by initiating and sustaining their turns. They convert more input to intake as they try out more hypotheses.\"",
   compare:[{title:"<span class='kw3'>HIG</span>",desc:"active · initiate turns · try hypotheses · more intake"},{title:"<span class='kw3'>LIG</span>",desc:"passive · less output · less intake conversion"}]},

  // ── 6. Information Processing ───────────────────────────────────────
  {src:"Information Processing",cat:"Controlled vs Automatic",
   text:"<span class='kw4'>Automatization</span> refers to the process by which <span class='kw2'>controlled processing</span> becomes <span class='kw2'>automatic processing</span> through meaningful practice.",
   ans:true,
   correct:"<span class='kw4'>Automatization</span> = controlled → automatic processing through <span class='kw2'>meaningful practice</span>. 의식적 노력이 필요했던 처리가 자동적·무의식적으로 이루어지게 되는 과정입니다.",
   why:"McLaughlin의 Information Processing Model: controlled processing(의식적·단기기억)이 meaningful practice를 통해 automatic processing(무의식적·장기기억)으로 전환됩니다. 이 과정이 automatization입니다.",
   source:"\"[<span class='kw2'>controlled</span> - (meaningful practice) → <span class='kw2'>automatic processing</span>] = <span class='kw4'>Automatization</span>. <span class='kw1'>Controlled processing</span>: conscious effort, new/unfamiliar skills. <span class='kw1'>Automatic processing</span>: without conscious, well-trained skills.\"",
   compare:[{title:"<span class='kw1'>Controlled processing</span>",desc:"conscious · unfamiliar · <span class='kw2'>short-term memory</span>"},{title:"<span class='kw1'>Automatic processing</span>",desc:"unconscious · well-trained · <span class='kw2'>long-term memory</span>"}]},

  // ── 7. Implicit/Explicit Model ──────────────────────────────────────
  {src:"Bialystok's Implicit/Explicit Model",cat:"Interface Position",
   text:"Bialystok's <span class='kw4'>interface position</span> states that <span class='kw2'>explicit knowledge</span> can become <span class='kw2'>implicit knowledge</span> through practice, which is called <span class='kw1'>proceduralization</span>.",
   ans:true,
   correct:"<span class='kw4'>Interface position</span>: explicit → implicit through <span class='kw2'>practice</span> = <span class='kw1'>proceduralization</span>. Krashen의 non-interface position(전환 불가)과 대비됩니다.",
   why:"Bialystok의 interface position은 의식적 explicit knowledge가 충분한 연습을 통해 자동적 implicit knowledge로 전환될 수 있다는 입장입니다. 이를 proceduralization(= automatization)이라 합니다.",
   source:"\"<span class='kw4'>Interface position</span>: explicit knowledge can turn into implicit knowledge through practice (<span class='kw1'>proceduralization</span> = automatization).\"",
   compare:[{title:"<span class='kw1'>Explicit knowledge</span>",desc:"conscious · declarative · formal instruction"},{title:"<span class='kw1'>Implicit knowledge</span>",desc:"automatic · procedural · meaningful use"}]},

  // ── 8. Skill-acquisition Theory ────────────────────────────────────
  {src:"Skill-acquisition Theory",cat:"Declarative vs Procedural",
   text:"In Skill-acquisition Theory, <span class='kw1'>declarative knowledge</span> refers to the ability to actually use the language, while <span class='kw1'>procedural knowledge</span> is knowledge that can be stated or declared.",
   ans:false,
   correct:"Reversed. <span class='kw1'>Declarative knowledge</span> = <span class='kw2'>knowledge that can be stated</span>. <span class='kw1'>Procedural knowledge</span> = <span class='kw2'>ability to USE</span> the knowledge.",
   why:"Skill-acquisition Theory: declarative knowledge(서술 가능한 지식)가 practice를 통해 procedural knowledge(실제 사용 능력)로 전환됩니다. Proceduralized knowledge는 working memory의 부담을 줄여줍니다.",
   source:"\"<span class='kw1'>Declarative knowledge</span>: knowledge that can be <span class='kw2'>stated or declared</span>. <span class='kw1'>Procedural knowledge</span>: an ability to <span class='kw2'>use</span> the knowledge. Declarative knowledge can be <span class='kw2'>proceduralized through practice</span>.\"",
   compare:[{title:"<span class='kw1'>Declarative</span>",desc:"'know about' · can state rules · explicit"},{title:"<span class='kw1'>Procedural</span>",desc:"'know how' · use automatically · implicit"}]},

  // ── 9. Processability / Teachability ───────────────────────────────
  {src:"Processability / Teachability",cat:"Teachability Hypothesis",
   text:"The <span class='kw3'>Teachability Hypothesis</span> agrees with Krashen in asserting that formal grammar instruction has no effect on the order of acquisition.",
   ans:false,
   correct:"<span class='kw3'>Teachability Hypothesis</span> <span class='kw2'>disagrees</span> with Krashen. It claims formal instruction <span class='kw2'>IS effective</span> — but only when it is <span class='kw2'>compatible with Ss' developmental status</span>.",
   why:"Teachability Hypothesis(Pienemann)는 Krashen의 zero option for grammar instruction에 반대합니다. 형식 교수는 효과가 있지만, 학습자의 interlanguage가 해당 구조를 자연적으로 습득할 준비가 된 시점에서만 효과적이라고 주장합니다.",
   source:"\"<span class='kw3'>Teachability Hypothesis</span>: language structure can be learnt from formal instruction only if Ls' interlanguage approximates the point when this target structure is <span class='kw2'>acquired in the natural setting</span>. ↔ Krashen: <span class='kw2'>zero option for grammar instruction</span>.\"",
   compare:[{title:"<span class='kw4'>Krashen</span>",desc:"zero option for grammar · natural order only"},{title:"<span class='kw3'>Teachability Hypo.</span>",desc:"grammar instruction works <span class='kw2'>if developmentally ready</span>"}]},

  // ── 10. Interaction Hypothesis ──────────────────────────────────────
  {src:"Interaction Hypothesis",cat:"Original vs Updated Version",
   text:"In the <span class='kw4'>original version</span> of Long's Interaction Hypothesis, both <span class='kw2'>comprehensible input</span> and <span class='kw2'>comprehensible output</span> are emphasized as equally essential for language acquisition.",
   ans:false,
   correct:"<span class='kw4'>Original version</span>: comprehensible input + <span class='kw2'>interactional modification</span> must precede. <span class='kw2'>Updated version</span>: added importance of <span class='kw2'>comprehensible output</span> and corrective feedback.",
   why:"Long의 original version은 comprehensible input을 제공하기 위해 interactional modification이 선행되어야 한다고 주장합니다. Updated version에서는 comprehensible output의 중요성(corrective feedback 제공 또는 자신의 output 생성 기회)을 추가했습니다.",
   source:"\"<span class='kw4'>Original version</span>: comprehensible input is necessary but <span class='kw2'>interactional modification must be preceded</span>. <span class='kw3'>Updated version</span>: added importance of <span class='kw2'>comprehensible output</span> — corrective feedback or opportunity to produce output.\"",
   compare:[{title:"<span class='kw4'>Original</span>",desc:"interactional modification → comprehensible input"},{title:"<span class='kw3'>Updated</span>",desc:"+ comprehensible output + corrective feedback"}]},

  {src:"Interaction Hypothesis",cat:"Negotiation of Meaning",
   text:"<span class='kw4'>Negotiation of meaning</span> occurs when interlocutors modify their interaction to achieve mutual comprehension, including strategies such as <span class='kw2'>clarification requests</span>, <span class='kw2'>confirmation checks</span>, and <span class='kw2'>comprehension checks</span>.",
   ans:true,
   correct:"<span class='kw4'>Negotiation of meaning</span>의 핵심 전략: <span class='kw2'>clarification requests</span>(이해 안 될 때 요청), <span class='kw2'>confirmation checks</span>(청자 자신의 이해 확인), <span class='kw2'>comprehension checks</span>(화자가 청자 이해 확인). 가장 효과적인 것은 clarification request입니다.",
   why:"Negotiation of meaning은 상호작용을 통해 comprehensible input을 만들어내는 과정입니다. 기출에서 clarification request가 가장 효과적인 negotiation strategy로 자주 언급됩니다.",
   source:"\"<span class='kw4'>Negotiation of meaning</span>: <span class='kw2'>clarification requests</span> (more information / self-correction), <span class='kw2'>confirmation checks</span> (listener confirms own understanding), <span class='kw2'>comprehension checks</span> (speaker checks listener's understanding).\"",
   compare:[{title:"<span class='kw2'>Clarification request</span>",desc:"'What do you mean?' · most effective"},{title:"<span class='kw2'>Confirmation check</span>",desc:"listener checks own understanding"},{title:"<span class='kw2'>Comprehension check</span>",desc:"speaker checks listener's understanding"}]},

  // ── 11. Sociocultural Theory ────────────────────────────────────────
  {src:"Sociocultural Theory",cat:"ZPD",
   text:"Vygotsky's <span class='kw4'>Zone of Proximal Development (ZPD)</span> refers to what a learner can already do independently without any assistance.",
   ans:false,
   correct:"<span class='kw4'>ZPD</span> = the <span class='kw2'>distance</span> between <span class='kw2'>actual development</span> (independent) and <span class='kw2'>potential development</span> (with guidance/collaboration).",
   why:"ZPD는 학습자가 혼자 할 수 있는 것(actual development)과 더 유능한 타인의 도움으로 할 수 있는 것(potential development) 사이의 거리입니다. 이 간격에서 scaffolding과 협력 학습이 이루어집니다.",
   source:"\"<span class='kw4'>ZPD</span>: the <span class='kw2'>distance between actual/potential development</span>. Adult guidance / collaboration with capable peers. Mixed level grouping.\"",
   compare:[{title:"<span class='kw2'>Actual development</span>",desc:"what L can do <span class='kw2'>independently</span>"},{title:"<span class='kw2'>Potential development</span>",desc:"what L can do <span class='kw2'>with guidance/peers</span>"}]},

  {src:"Sociocultural Theory",cat:"Scaffolding",
   text:"<span class='kw3'>Scaffolding</span> in Sociocultural Theory has only one definition: the supportive environment created through guidance or feedback during collaboration with more capable ones.",
   ans:false,
   correct:"<span class='kw3'>Scaffolding</span> has <span class='kw2'>TWO definitions</span>: ① supportive environment through guidance/feedback ② interactional supports enabling L to perform what one cannot do independently.",
   why:"서브노트에서 scaffolding의 두 가지 정의를 명시하고 있습니다. ① 협력 과정에서 더 유능한 타인이 제공하는 지원적 환경 ② 학습자가 독립적으로 수행할 수 없는 것을 가능하게 하는 interactional supports. 기출에서 이 두 정의의 구분이 중요합니다.",
   source:"\"<span class='kw3'>Scaffolding</span>: 1) Supportive environment created through <span class='kw2'>guidance or feedback during collaboration</span>. 2) <span class='kw2'>Interactional supports</span> which enables L to perform or master what one has not been able to do independently.\"",
   compare:[{title:"Definition ①",desc:"supportive environment · guidance/feedback · collaboration"},{title:"Definition ②",desc:"interactional supports · enables independent performance"}]},

  {src:"Sociocultural Theory",cat:"Regulation",
   text:"In Sociocultural Theory, the learning process progresses from <span class='kw1'>self-regulation</span> → <span class='kw1'>other-regulation</span> → <span class='kw1'>object-regulation</span> as learners become more proficient.",
   ans:false,
   correct:"The order is reversed: <span class='kw1'>object-regulation</span> → <span class='kw1'>other-regulation</span> → <span class='kw1'>self-regulation</span>. Self-regulation is the <span class='kw2'>goal</span>.",
   why:"Regulation의 발달 순서: object-regulation(사전/도구 등 물리적 대상에 의존) → other-regulation(타인의 언어적 안내에 의존) → self-regulation(자율적·독립적 수행). 자기조절(self-regulation)이 최종 목표입니다.",
   source:"\"Learning is a process of moving from '<span class='kw1'>object-regulation</span>' to '<span class='kw1'>other-regulation</span>' to '<span class='kw1'>self-regulation</span>'. <span class='kw1'>Self-regulation</span>: L becomes skilled and able to act <span class='kw2'>independently and autonomously</span>.\"",
   compare:[{title:"<span class='kw1'>Object-regulation</span>",desc:"physical objects (dictionaries) · early stage"},{title:"<span class='kw1'>Other-regulation</span>",desc:"verbal guidance from others · middle stage"},{title:"<span class='kw1'>Self-regulation</span>",desc:"autonomous · infer independently · <span class='kw2'>goal</span>"}]},

  {src:"Sociocultural Theory",cat:"Imitation",
   text:"In Sociocultural Theory, <span class='kw2'>imitation</span> is viewed the same as in Behaviorism — as a mechanical, non-creative mimicry used for habit formation.",
   ans:false,
   correct:"In Sociocultural Theory, imitation is a <span class='kw2'>creative and transformative activity</span>. In Behaviorism, it is <span class='kw2'>mechanical mimicry</span>.",
   why:"사회문화 이론에서 imitation은 학습자가 아직 이해하지 못한 L2 features를 의도적으로 모방하여 internalization으로 이어지는 창의적·변형적 활동입니다. 행동주의의 기계적 모방과는 근본적으로 다릅니다.",
   source:"\"While imitation in <span class='kw2'>Behaviorism</span> is <span class='kw2'>non-creative, mechanical mimicry</span>, imitation in <span class='kw2'>Sociocultural Theory</span> is a <span class='kw2'>creative and transformative activity</span>.\"",
   compare:[{title:"<span class='kw2'>Behaviorism</span>: imitation",desc:"mechanical · non-creative · habit formation"},{title:"<span class='kw3'>Sociocultural</span>: imitation",desc:"creative · transformative → <span class='kw2'>internalization</span>"}]},

  {src:"SLA Theory",cat:"기출 종합",
   text:"According to Krashen, the most effective way to acquire a language is through explicit grammar instruction combined with form-focused drills, as this directly builds both <span class='kw2'>acquired</span> and <span class='kw2'>learnt</span> knowledge simultaneously.",
   ans:false,
   correct:"Krashen advocates <span class='kw2'>natural communication</span> with <span class='kw4'>comprehensible input</span>, <span class='kw2'>minimal error correction</span>, and <span class='kw2'>zero option for explicit grammar instruction</span>.",
   why:"Krashen의 핵심 교육적 시사점: ① comprehensible input(interesting, relevant, i+1) ② silent period 존중 ③ minimal error correction ④ grammar instruction 불필요(zero option) ⑤ low affective filter 환경 조성. 문법 드릴은 Behaviorism/ALM의 방식입니다.",
   source:"\"Krashen's implications: For beginners / <span class='kw2'>Minimal error correction</span> / <span class='kw2'>silent period</span> (naturally emerges) / Input (<span class='kw2'>comprehensible, interest, relevant, sequenced, affective</span>). <span class='kw2'>Zero option for grammar instruction</span>.\"",
   compare:[{title:"<span class='kw4'>Krashen</span>",desc:"comprehensible input · natural comm. · no grammar drill"},{title:"<span class='kw2'>Behaviorism</span>",desc:"explicit grammar · pattern drill · form-focused"}]}
];

let cur=0;
const TOTAL=Q.length;
const SAVE_KEY='ox_sla_v1';
let answers=new Array(TOTAL).fill(null);

function getScore(){return answers.filter(a=>a&&a.correct).length;}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers}));}
function clearProgress(){localStorage.removeItem(SAVE_KEY);}

function freshStart(){
  cur=0;answers=new Array(TOTAL).fill(null);clearProgress();
  document.getElementById('rb').style.display='none';
  document.getElementById('qa').style.display='block';
  renderNav();render();
}

function renderNav(){
  document.getElementById('nav').innerHTML=Array.from({length:TOTAL},(_,i)=>{
    const a=answers[i];
    const cls=i===cur?'nd cur':a===null?'nd':a.correct?'nd ok':'nd ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}

function jumpTo(i){cur=i;render();}

function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`
    <div class="sec-label">📊 비교 정리</div>
    <div class="compare${three?' three':''}">
      ${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}
    </div>`:'';
  return `<div class="exp show">
    <div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div>
    <div class="exp-answer"><div class="ans-label">핵심 정정</div><div class="ans-text">${q.correct}</div></div>
    <div class="exp-body">
      <div class="sec-label">📖 상세 설명</div><p>${q.why}</p>
      <div class="sec-label">📌 Source</div>
      <div class="def-box"><p>${q.source}</p></div>
      ${cmp}
    </div>
  </div>`;
}

function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button>
        </div>
        <div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div>
        <div>${renderExp(q,a.correct)}</div>
        <button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }else{
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button>
        </div>
        <div id="bd" class="badge"></div>
        <div id="ep"></div>
        <button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }
}

function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();
}

function next(){
  cur++;
  if(cur>=TOTAL){clearProgress();}else{saveProgress();}
  render();
}
function restart(){cur=0;answers=new Array(TOTAL).fill(null);clearProgress();document.getElementById('sc').classList.remove('show');document.getElementById('rb').style.display='none';document.getElementById('qa').style.display='block';renderNav();render();}

(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    const done=answers.filter(a=>a!==null).length;
    if(done>0){
      document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;
      document.getElementById('rb').style.display='block';
    }
  }
  renderNav();render();
})();
</script>
</body>
</html>

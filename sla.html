  {src:"Sociocultural Theory",cat:"Regulation",
   text:"In Sociocultural Theory, the learning process progresses from <span class='kw1'>self-regulation</span> вЖТ <span class='kw1'>other-regulation</span> вЖТ <span class='kw1'>object-regulation</span> as learners become more proficient.",

   why:"RegulationмЭШ л∞ЬлЛђ мИЬмДЬ: object-regulation(мВђм†Д/лПДкµђ лУ± лђЉл¶ђм†Б лМАмГБмЧР мЭШм°і) вЖТ other-regulation(нГАмЭЄмЭШ мЦЄмЦім†Б мХИлВімЧР мЭШм°і) вЖТ self-regulation(мЮРмЬ®м†Б¬ЈлПЕл¶љм†Б мИШнЦЙ). мЮРкЄ∞м°∞м†И(self-regulation)мЭі мµЬмҐЕ л™©нСЬмЮЕлЛИлЛ§.",
   source:"\"Learning is a process of moving from '<span class='kw1'>object-regulation</span>' to '<span class='kw1'>other-regulation</span>' to '<span class='kw1'>self-regulation</span>'. <span class='kw1'>Self-regulation</span>: L becomes skilled and able to act <span class='kw2'>independently and autonomously</span>.\"",
   compare:[{title:"<span class='kw1'>Object-regulation</span>",desc:"physical objects (dictionaries) ¬Ј early stage"},{title:"<span class='kw1'>Other-regulation</span>",desc:"verbal guidance from others ¬Ј middle stage"},{title:"<span class='kw1'>Self-regulation</span>",desc:"autonomous ¬Ј infer independently ¬Ј <span class='kw2'>goal</span>"}]},

  {src:"Sociocultural Theory",cat:"Imitation",
   text:"In Sociocultural Theory, <span class='kw2'>imitation</span> is viewed the same as in Behaviorism вАФ as a mechanical, non-creative mimicry used for habit formation.",
   ans:false,
   correct:"In Sociocultural Theory, imitation is a <span class='kw2'>creative and transformative activity</span>. In Behaviorism, it is <span class='kw2'>mechanical mimicry</span>.",
   why:"мВђнЪМлђЄнЩФ мЭіл°†мЧРмДЬ imitationмЭА нХЩмКµмЮРк∞А мХДмІБ мЭінХінХШмІА л™їнХЬ L2 featuresл•Љ мЭШлПДм†БмЬЉл°Ь л™®л∞©нХШмЧђ internalizationмЬЉл°Ь мЭімЦімІАлКФ м∞љмЭШм†Б¬Јл≥АнШХм†Б нЩЬлПЩмЮЕлЛИлЛ§. нЦЙлПЩм£ЉмЭШмЭШ кЄ∞к≥Дм†Б л™®л∞©к≥ЉлКФ кЈЉл≥Єм†БмЬЉл°Ь лЛ§л¶ЕлЛИлЛ§.",
   source:"\"While imitation in <span class='kw2'>Behaviorism</span> is <span class='kw2'>non-creative, mechanical mimicry</span>, imitation in <span class='kw2'>Sociocultural Theory</span> is a <span class='kw2'>creative and transformative activity</span>.\"",
   compare:[{title:"<span class='kw2'>Behaviorism</span>: imitation",desc:"mechanical ¬Ј non-creative ¬Ј habit formation"},{title:"<span class='kw3'>Sociocultural</span>: imitation",desc:"creative ¬Ј transformative вЖТ <span class='kw2'>internalization</span>"}]},

  {src:"SLA Theory",cat:"кЄ∞мґЬ мҐЕнХ©",

   why:"KrashenмЭШ нХµмЛђ кµРмЬ°м†Б мЛЬмВђм†Р: вС† comprehensible input(interesting, relevant, i+1) вС° silent period м°ім§С вСҐ minimal error correction вС£ grammar instruction лґИнХДмЪФ(zero option) вС§ low affective filter нЩШк≤љ м°∞мД±. лђЄл≤Х лУЬл¶імЭА Behaviorism/ALMмЭШ л∞©мЛЭмЮЕлЛИлЛ§.",

];

let cur=0,score=0;
const TOTAL=Q.length;
const SAVE_KEY='ox_sla_v1';

function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,score}));}
function clearProgress(){localStorage.removeItem(SAVE_KEY);}

function freshStart(){
  cur=0;score=0;clearProgress();
  document.getElementById('rb').style.display='none';
  document.getElementById('qa').style.display='block';
  render();
}

function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`
    <div class="sec-label">рЯУК лєДкµР м†Хл¶ђ</div>
    <div class="compare${three?' three':''}">
      ${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}
    </div>`:'';
  return `<div class="exp show">
    <div class="exp-header"><span>${isCorrect?'вЬЕ м†ХлЛµ':'вЭМ мШ§лЛµ'} ¬Ј нХімД§</span></div>
    <div class="exp-answer"><div class="ans-label">нХµмЛђ м†Хм†Х</div><div class="ans-text">${q.correct}</div></div>
    <div class="exp-body">
      <div class="sec-label">рЯУЦ мГБмДЄ мД§л™Е</div><p>${q.why}</p>
      <div class="sec-label">рЯУМ Source</div>
      <div class="def-box"><p>${q.source}</p></div>
      ${cmp}
    </div>
  </div>`;
}

function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    document.getElementById('fs').textContent=score;
    const p=score/TOTAL;
    document.getElementById('rm').textContent=p===1?'рЯОЙ Perfect!':p>=.8?'рЯСП Great!':p>=.6?'рЯШК Good!':'рЯТ™ Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}лђЄм†Ь м§С ${score}лђЄм†Ь м†ХлЛµ (${Math.round(p*100)}%)`;
    return;
  }
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`м†ХлЛµ ${score}к∞Ь`;
  document.getElementById('qa').innerHTML=`
    <div class="card">
      <div class="q-meta">
        <span class="q-num">Q${cur+1}</span>
        <span class="q-src">${q.src}</span>
        <span class="q-cat">${q.cat}</span>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="ox-btns">
        <button class="ox-btn o-btn" onclick="pick(true)" id="ob">в≠Х<span class="lb">CORRECT</span></button>
        <button class="ox-btn x-btn" onclick="pick(false)" id="xb">вЭМ<span class="lb">WRONG</span></button>
      </div>
      <div id="bd" class="badge"></div>
      <div id="ep"></div>
      <button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next вЖТ':'к≤∞к≥Љ л≥ікЄ∞ вЖТ'}</button>
    </div>`;
}

function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  if(ok)score++;
  const bd=document.getElementById('bd');
  bd.textContent=ok?'вЬЕ м†ХлЛµ!':`вЭМ мШ§лЛµ! м†ХлЛµмЭА ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`м†ХлЛµ ${score}к∞Ь`;
}

function next(){
  cur++;
  if(cur>=TOTAL){clearProgress();}else{saveProgress();}
  render();
}
function restart(){cur=0;score=0;clearProgress();document.getElementById('sc').classList.remove('show');document.getElementById('rb').style.display='none';document.getElementById('qa').style.display='block';render();}

// м†АмЮ•лРЬ мІДнЦЙ мГБнГЬ л≥µмЫР
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.cur>0&&saved.cur<TOTAL){
    cur=saved.cur;score=saved.score;
    const rb=document.getElementById('rb');
    document.getElementById('rb-msg').textContent=`мЭімЦімДЬ нТАкЄ∞ м§С ¬Ј ${cur}/${TOTAL} лђЄм†Ь мЩДл£М (м†ХлЛµ ${score}к∞Ь)`;
    rb.style.display='block';
  }
  render();
})();
</script>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f4ee;background-image:repeating-linear-gradient(transparent,transparent 27px,#ddddd0 28px);color:#1a1a1a;min-height:100vh;padding:16px}
.header-wrap{max-width:720px;margin:0 auto;padding:20px 8px 0}

.ans-label{font-size:11px;font-family:'JetBrains Mono',monospace;color:#4a7a62;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}
.ans-text{font-size:15px;color:#1a3326;line-height:1.75;font-weight:500}
.exp-body{background:rgba(46,125,82,.03);border:1.5px solid rgba(46,125,82,.15);border-top:1px solid rgba(46,125,82,.1);padding:14px 16px}
.sec-label{font-size:11px;font-family:'JetBrains Mono',monospace;color:#00796b;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;margin-top:13px;font-weight:700}
.sec-label:first-child{margin-top:0}

.def-box{background:rgba(38,166,154,.06);border-left:4px solid #26a69a;padding:10px 14px;border-radius:0 8px 8px 0;margin:8px 0}
.def-box p{color:#004d40;font-size:13.5px;font-style:italic;line-height:1.75}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.compare.three{grid-template-columns:1fr 1fr 1fr}

.ci-title{font-size:11px;font-family:'JetBrains Mono',monospace;color:#1b5e3a;font-weight:700;margin-bottom:5px}
.compare-item p{font-size:13px;color:#3a6b51;line-height:1.65}
.next-btn{display:none;width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#2e7d52,#26a69a);border:none;border-radius:10px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .2s}
.next-btn:hover{opacity:.88;transform:translateY(-1px)}
.next-btn.show{display:block;animation:fade .3s ease}
.score-card{display:none;text-align:center;padding:48px 24px}
.score-card.show{display:block;animation:up .5s ease}
.score-circle{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,#2e7d52,#26a69a);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 40px rgba(46,125,82,.3)}
.s-num{font-size:42px;font-weight:700;line-height:1;color:#fff}
.s-total{font-size:14px;opacity:.85;color:#fff}
.score-card h2{font-size:24px;margin-bottom:7px;color:#1a1a1a}
.score-card p{color:#555;margin-bottom:24px;font-size:15px}
.restart-btn{padding:13px 32px;background:#fff;border:2px solid #1a1a1a;border-radius:10px;color:#1a1a1a;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.restart-btn:hover{background:#f5f4ee}
.nd{width:28px;height:28px;border-radius:6px;border:1.5px solid #b2dfcc;background:#fff;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;color:#4a7a62;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;font-weight:600}
.nd.cur{border-color:#2e7d52;background:#2e7d52;color:white}
.nd.ok{border-color:#2e7d52;background:rgba(46,125,82,.15);color:#1b5e3a}
.nd.ng{border-color:#c62828;background:rgba(198,40,40,.1);color:#c62828}
.nd:hover:not(.cur){opacity:.7}
#nav{display:flex;flex-wrap:wrap;gap:5px;max-width:720px;margin:0 auto 16px;padding:0 8px}
</style>

<script>
const SAVE_KEY='ox_linguistic_v1';
const TOTAL=20;
let cur=0;
let answers=new Array(TOTAL).fill(null);
function getScore(){return answers.filter(a=>a&&a.correct).length;}
const Q=[
  {src:"Contrastive Analysis",cat:"Types of Transfer",text:"<span class='kw1'>Interference</span> is a type of <span class='kw2'>intralingual</span> transfer where a learner overgeneralizes a rule within the target language itself.",ans:false,correct:"<span class='kw1'>Interference</span> is <span class='kw2'>interlingual</span> transfer (L1 → L2). <span class='kw1'>Overgeneralization</span> is <span class='kw2'>intralingual</span> transfer (within L2).",why:"Transfer의 방향이 핵심입니다. Interference(= interlingual transfer)는 L1의 규칙이 L2에 잘못 적용되는 것이고, Overgeneralization(= intralingual transfer)은 L2 내에서 특정 규칙을 허용 범위 이상으로 일반화하는 것입니다.",source:"\"<span class='kw1'>Interference</span>: A type of <span class='kw2'>negative transfer</span> where a previous item is incorrectly transferred (= <span class='kw2'>interlingual</span>). <span class='kw1'>Overgeneralization</span>: A type of <span class='kw2'>intralingual</span> transfer.\"",compare:[{title:"<span class='kw4'>Interference</span>",desc:"<span class='kw2'>interlingual</span> · L1 → L2 · e.g. 'see an exam'"},{title:"<span class='kw4'>Overgeneralization</span>",desc:"<span class='kw2'>intralingual</span> · L2 내 · e.g. 'I goed'"}]},
  {src:"Contrastive Analysis",cat:"Avoidance & Overuse",text:"<span class='kw1'>Avoidance</span> occurs when a learner overuses a certain expression in the target language even when it sounds unnatural, because the same expression exists in their L1.",ans:false,correct:"That describes <span class='kw1'>overuse</span>. <span class='kw1'>Avoidance</span> = learner <span class='kw2'>avoids</span> a structure because their L1 <span class='kw2'>lacks</span> that structure.",why:"Avoidance는 L1에 없는 구조를 TL에서 사용하지 않으려는 것이고, Overuse는 L1에 있는 표현을 TL에서 부자연스럽게 과용하는 것입니다.",source:"\"<span class='kw1'>Avoidance</span>: avoids structure because L1 does <span class='kw2'>not have</span> it. <span class='kw1'>Overuse</span>: <span class='kw2'>overuses</span> expression even if unnatural in TL.\"",compare:[{title:"<span class='kw1'>Avoidance</span>",desc:"L1에 <span class='kw2'>없어서</span> 안 씀"},{title:"<span class='kw1'>Overuse</span>",desc:"L1에 <span class='kw2'>있어서</span> 과용"}]},
  {src:"Contrastive Analysis",cat:"Strong vs Weak CAH",text:"The <span class='kw3'>strong version</span> of CAH analyzes errors <span class='kw2'>after</span> they occur to identify L1 influence, while the <span class='kw3'>weak version</span> predicts errors <span class='kw2'>before</span> they occur.",ans:false,correct:"Reversed. <span class='kw3'>Strong version</span>: <span class='kw2'>predicts</span> errors BEFORE by comparing L1–L2. <span class='kw3'>Weak version</span>: analyzes errors <span class='kw2'>after</span> they occur.",why:"Strong version은 L1-L2 대조 분석으로 오류를 사전 예측하고 어려운 항목을 가르칩니다. Weak version은 오류 발생 후 L1 영향을 파악하는 사후 분석 방식입니다.",source:"\"<span class='kw3'>Strong version</span>: Description → Contrast → <span class='kw2'>Prediction</span> (before error). <span class='kw3'>Weak version</span>: Contrast <span class='kw2'>after error</span>.\"",compare:[{title:"<span class='kw3'>Strong CAH</span>",desc:"<span class='kw2'>predicts</span> errors BEFORE · L1 diff → teach"},{title:"<span class='kw3'>Weak CAH</span>",desc:"analyzes errors <span class='kw2'>after</span> · cross-linguistic influence"}]},
  {src:"Interlanguage",cat:"Characteristics",text:"<span class='kw4'>Interlanguage</span> is a fixed, static system that reflects only the learner's L1 without any influence from the target language.",ans:false,correct:"<span class='kw4'>Interlanguage</span> is <span class='kw2'>systematic, variable, and dynamic</span> — an intermediate system between L1 and TL that evolves over time.",why:"Interlanguage는 L1과 TL 사이의 중간 체계로, 고정되어 있지 않고 체계적(systematic)이면서 가변적(variable)이고 역동적(dynamic)으로 발달합니다.",source:"\"<span class='kw4'>Interlanguage</span>: An intermediate system between L1 and TL. <span class='kw2'>Systematic, Variable, Dynamic</span>. Own unique, coherent rule system.\"",compare:[{title:"<span class='kw2'>Systematic</span>",desc:"own coherent rule system"},{title:"<span class='kw2'>Variable</span>",desc:"varies across contexts"},{title:"<span class='kw2'>Dynamic</span>",desc:"changes and develops"}]},
  {src:"Interlanguage",cat:"Developmental Stages",text:"In the <span class='kw3'>emergent stage</span>, learners can self-correct when given feedback, and their production shows consistent rule application.",ans:false,correct:"<span class='kw3'>Emergent stage</span>: some consistency but <span class='kw2'>NO self-correction</span> with feedback (<span class='kw2'>backsliding</span> occurs). Self-correction appears in the <span class='kw3'>systematic stage</span>.",why:"Presystematic(random errors) → Emergent(일부 일관성, backsliding, self-correction X) → Systematic(self-correction O) → Stabilization(few errors, self-correction before feedback).",source:"\"<span class='kw3'>Emergent stage</span>: Some consistency; <span class='kw2'>Backsliding</span>; <span class='kw2'>No self-correction</span>. <span class='kw3'>Systematic stage</span>: <span class='kw2'>Ability to self-correct</span>.\"",compare:[{title:"<span class='kw3'>Emergent</span>",desc:"backsliding · NO self-correct"},{title:"<span class='kw3'>Systematic</span>",desc:"self-correct with feedback"},{title:"<span class='kw3'>Stabilization</span>",desc:"self-correct WITHOUT feedback"}]},
  {src:"Interlanguage",cat:"Fossilization",text:"<span class='kw3'>Fossilization</span> is a temporary stage in interlanguage development where learners make consistent errors that can be easily corrected through explicit feedback.",ans:false,correct:"<span class='kw3'>Fossilization</span> is a <span class='kw2'>relatively permanent</span> incorporation of incorrect forms — caused by lack of negative feedback, insensitivity to feedback, or excessive automatization.",why:"Fossilization은 잘못된 언어 형식이 상대적으로 영구적으로 굳어지는 현상입니다. 예방을 위해 explicit corrective feedback이 필요합니다.",source:"\"<span class='kw3'>Fossilization</span>: A <span class='kw2'>relatively permanent</span> incorporation of incorrect linguistic forms. Caused by: <span class='kw2'>lack of negative feedback, insensitivity, too much automatization</span>.\"",compare:[{title:"<span class='kw3'>Fossilization</span>",desc:"<span class='kw2'>permanent</span> · no negative feedback"},{title:"Prevention",desc:"<span class='kw2'>explicit corrective feedback</span>"}]},
  {src:"Interlanguage",cat:"U-shaped Learning",text:"<span class='kw3'>U-shaped learning</span> refers to a pattern where learners produce correct forms initially, then begin making errors, and eventually return to correct production.",ans:true,correct:"<span class='kw3'>U-shaped learning</span>: correct (imitation/lexical item) → <span class='kw2'>overgeneralization</span> (incorrect) → correct (rule internalized). 처음 정확한 형태는 모방이나 어휘 단위로 인식한 결과입니다.",why:"초기 정확한 생산은 imitation 또는 별도 어휘 항목으로 인식한 결과입니다. 이후 L2 규칙을 일반화하는 과정에서 overgeneralization으로 오류가 발생하고, 결국 올바른 형태로 돌아옵니다. (e.g. went → goed → went)",source:"\"<span class='kw3'>U-shaped learning</span>: correct form → incorrect form → back to correct form. Regression caused by <span class='kw2'>overgeneralization</span>.\"",compare:[{title:"Phase 1 (correct)",desc:"imitation · lexical item"},{title:"Phase 2 (incorrect)",desc:"<span class='kw2'>overgeneralization</span>"},{title:"Phase 3 (correct)",desc:"rule <span class='kw2'>internalized</span>"}]},
  {src:"Error Analysis",cat:"Global vs Local",text:"<span class='kw3'>Local errors</span> are errors that hinder communication and must be corrected, while <span class='kw3'>global errors</span> do not prevent a message from being understood.",ans:false,correct:"Reversed. <span class='kw3'>Global errors</span> = <span class='kw2'>hinder communication</span> → must correct. <span class='kw3'>Local errors</span> = <span class='kw2'>message still understood</span> → not necessarily correct.",why:"Global errors는 의사소통을 방해하는 오류로 반드시 수정이 필요합니다. Local errors는 의미 전달은 되지만 형식적 오류가 있는 경우입니다.",source:"\"<span class='kw3'>Global errors</span>: <span class='kw2'>hinder communication</span>. <span class='kw3'>Local errors</span>: <span class='kw2'>does not prevent</span> message.\"",compare:[{title:"<span class='kw3'>Global error</span>",desc:"<span class='kw2'>hinders</span> communication · must correct"},{title:"<span class='kw3'>Local error</span>",desc:"message <span class='kw2'>delivered</span> · not necessarily correct"}]},
  {src:"Error Analysis",cat:"Overt vs Covert",text:"<span class='kw1'>Covert errors</span> are errors that are clearly ungrammatical at the sentence level and can be easily identified by looking at the sentence structure alone.",ans:false,correct:"That describes <span class='kw1'>overt errors</span>. <span class='kw1'>Covert errors</span> are grammatically <span class='kw2'>well-formed at sentence level</span> but not interpretable in the <span class='kw2'>context of communication</span>.",why:"Overt errors는 문장 차원에서 명백히 비문법적인 오류입니다. Covert errors는 문장 자체는 문법적이지만 의사소통 맥락에서 해석이 불가능한 오류입니다.",source:"\"<span class='kw1'>Overt errors</span>: noticed on the <span class='kw2'>sentence level</span>. <span class='kw1'>Covert errors</span>: <span class='kw2'>grammatically well formed</span> but not interpretable within <span class='kw2'>context</span>.\"",compare:[{title:"<span class='kw1'>Overt error</span>",desc:"sentence level · <span class='kw2'>ungrammatical</span>"},{title:"<span class='kw1'>Covert error</span>",desc:"grammatically OK · <span class='kw2'>discourse level</span>"}]},
  {src:"Corrective Feedback",cat:"Recast",text:"<span class='kw4'>Recast</span> is an explicit type of corrective feedback that interrupts the flow of communication to directly indicate the error and provide the correct form.",ans:false,correct:"<span class='kw4'>Recast</span> is <span class='kw2'>implicit</span> feedback — it <span class='kw2'>maintains communicative flow</span> by reformulating the erroneous utterance without overtly signaling it as an error.",why:"Recast의 핵심 특징: ① implicit ② maintains communicative flow ③ positive + negative evidence 모두 포함 ④ 학습자가 confirmation으로 오해 가능.",source:"\"<span class='kw4'>Recast</span>: Reformulation while <span class='kw2'>maintaining focus on meaning</span>. Contains both <span class='kw2'>positive and negative evidence</span>.\"",compare:[{title:"<span class='kw4'>Recast</span> (implicit)",desc:"<span class='kw2'>flow 유지</span> · positive+negative evidence"},{title:"<span class='kw2'>Explicit correction</span>",desc:"directly indicate error · <span class='kw2'>flow 끊김</span>"}]},
  {src:"Corrective Feedback",cat:"Metalinguistic Feedback",text:"<span class='kw3'>Metalinguistic feedback</span> provides both a comment about the error AND the correct form, helping learners immediately understand what the correct structure should be.",ans:false,correct:"<span class='kw3'>Metalinguistic feedback</span> provides comments/questions about the error but does <span class='kw2'>NOT explicitly provide the correct form</span>.",why:"Metalinguistic feedback는 오류의 성격에 대한 언어적 설명을 제공하지만 올바른 형태를 직접 제시하지 않습니다. (e.g. 'Can you find the error?', 'What is the past tense of this verb?')",source:"\"<span class='kw3'>Metalinguistic feedback</span>: Points out nature of error <span class='kw2'>without explicitly providing the correct form</span>.\"",compare:[{title:"<span class='kw3'>Metalinguistic</span>",desc:"comment/question · <span class='kw2'>NO correct form</span>"},{title:"<span class='kw2'>Explicit correction</span>",desc:"indicate error + <span class='kw2'>provides correct form</span>"}]},
  {src:"Corrective Feedback",cat:"Elicitation",text:"<span class='kw3'>Elicitation</span> is a technique that provides the correct form directly to the learner in response to their error, without requiring any learner participation.",ans:false,correct:"<span class='kw3'>Elicitation</span> <span class='kw2'>directly elicits the correct form FROM the learner</span> — pushes L to <span class='kw2'>self-correct</span> using incomplete sentences or questions.",why:"Elicitation은 교사가 정답을 주는 것이 아니라 학습자가 스스로 올바른 형태를 생산하도록 유도하는 기법입니다. (e.g. 'He comes...' / 'We are...?')",source:"\"<span class='kw3'>Elicitation</span>: directly elicit correct form <span class='kw2'>from the L</span>. Pushes L to <span class='kw2'>self-correct</span>.\"",compare:[{title:"<span class='kw3'>Elicitation</span>",desc:"L이 <span class='kw2'>self-correct</span>하도록 유도"},{title:"<span class='kw3'>Metalinguistic</span>",desc:"error 성격 설명 · no correct form"}]},
  {src:"Corrective Feedback",cat:"Uptake",text:"<span class='kw3'>Uptake</span> refers to any learner utterance that immediately follows the teacher's corrective feedback, regardless of whether the error has been successfully repaired.",ans:true,correct:"<span class='kw3'>Uptake</span> = utterance that <span class='kw2'>immediately follows</span> teacher's feedback — can be <span class='kw2'>successful</span> (error repaired) or <span class='kw2'>unsuccessful</span> (error remains).",why:"Uptake는 교사의 피드백에 즉각적으로 반응하는 학습자의 발화입니다. successful uptake, unsuccessful uptake, no uptake, acknowledgement으로 구분됩니다.",source:"\"<span class='kw3'>Uptake</span>: utterance that <span class='kw2'>immediately follows</span> teacher's feedback. <span class='kw2'>Successful / Unsuccessful</span>.\"",compare:[{title:"<span class='kw3'>Successful uptake</span>",desc:"error <span class='kw2'>repaired</span>"},{title:"<span class='kw3'>Unsuccessful uptake</span>",desc:"attempts but <span class='kw2'>still incorrect</span>"},{title:"<span class='kw2'>No uptake</span>",desc:"ignores / acknowledges only"}]},
  {src:"Corrective Feedback",cat:"Implicit vs Explicit",text:"<span class='kw4'>Recast</span> is categorized as explicit negative feedback because it clearly signals to learners that their utterance contained an error.",ans:false,correct:"<span class='kw4'>Recast</span> is <span class='kw2'>implicit</span> negative feedback — does not <span class='kw2'>overtly draw attention</span> to the error, which is why learners may miss it.",why:"Implicit feedback(recast)는 오류에 대한 직접적 언급 없이 의사소통 흐름 안에서 제공됩니다. Recast의 한계: 학습자가 confirmation으로 오해하거나 form 수정을 알아채지 못할 수 있습니다.",source:"\"<span class='kw2'>Implicit feedback</span>: does <span class='kw2'>not draw overt attention</span> to the error. <span class='kw4'>Recast</span> = implicit feedback.\"",compare:[{title:"<span class='kw2'>Implicit</span> (recast)",desc:"no overt attention · <span class='kw2'>flow 유지</span>"},{title:"<span class='kw2'>Explicit</span>",desc:"overt attention · <span class='kw2'>flow 끊김</span>"}]},
  {src:"Modified Input",cat:"Foreigner Talk vs Teacher Talk",text:"<span class='kw3'>Foreigner talk</span> and <span class='kw3'>teacher talk</span> refer to the same type of modified input, as both involve simplification of speech for non-proficient speakers in a classroom context.",ans:false,correct:"<span class='kw3'>Foreigner talk</span> = used by <span class='kw2'>native speakers</span> speaking to non-proficient foreigners. <span class='kw3'>Teacher talk</span> = input provided by the <span class='kw2'>teacher</span> in classroom.",why:"두 개념은 다른 화자를 전제합니다. Foreigner talk는 교실 밖에서 원어민이 외국인에게, Teacher talk는 교실 내 교사가 학습자에게 제공하는 입력입니다.",source:"\"<span class='kw3'>Foreigner Talk</span>: used by <span class='kw2'>native speakers</span> to foreigners. <span class='kw3'>Teacher Talk</span>: input by <span class='kw2'>T</span> in classroom.\"",compare:[{title:"<span class='kw2'>Care-taker talk</span>",desc:"parents → young children"},{title:"<span class='kw3'>Foreigner talk</span>",desc:"native speakers → foreigners"},{title:"<span class='kw3'>Teacher talk</span>",desc:"teacher → classroom Ss"}]},
  {src:"Modified Input",cat:"Input Modification Types",text:"<span class='kw1'>Elaboration</span> involves replacing complex vocabulary and grammar with simpler forms to make input more comprehensible.",ans:false,correct:"That describes <span class='kw1'>simplification</span>. <span class='kw1'>Elaboration</span> = <span class='kw2'>restating ideas in different ways</span> or repeating segments — has a <span class='kw2'>positive effect</span> on SLA.",why:"Simplification은 어휘·문법을 더 단순한 형태로 교체하는 것이고, Elaboration은 원본 내용을 다른 방식으로 재진술하거나 반복하는 것입니다.",source:"\"<span class='kw1'>Simplification</span>: replace complex → simple. <span class='kw1'>Elaboration</span>: <span class='kw2'>restate/repeat</span> differently; <span class='kw2'>positive effect</span> on SLA.\"",compare:[{title:"<span class='kw1'>Simplification</span>",desc:"replace complex → simple"},{title:"<span class='kw1'>Elaboration</span>",desc:"<span class='kw2'>restate/repeat</span> → SLA↑"},{title:"<span class='kw1'>Regularization</span>",desc:"more basic/explicit forms"}]},
  {src:"Corrective Feedback",cat:"Display Q vs Referential Q",text:"A <span class='kw4'>referential question</span> is one to which the teacher already knows the answer and uses it to check students' comprehension of course content.",ans:false,correct:"That describes a <span class='kw4'>display question</span>. A <span class='kw4'>referential question</span> is one where the <span class='kw2'>teacher/questioner does NOT know</span> the answer beforehand.",why:"Display question은 교사가 이미 답을 알고 이해도를 확인하는 질문입니다. Referential question은 교사도 답을 모르는 진짜 정보 요청 질문으로 authentic communication을 촉진합니다.",source:"\"<span class='kw4'>Display question</span>: elicit information <span class='kw2'>already known</span>. <span class='kw4'>Referential question</span>: T does <span class='kw2'>not know</span> the answer beforehand.\"",compare:[{title:"<span class='kw4'>Display Q</span>",desc:"T <span class='kw2'>already knows</span> answer"},{title:"<span class='kw4'>Referential Q</span>",desc:"T does <span class='kw2'>NOT know</span> answer"}]},
  {src:"Corrective Feedback",cat:"Pushed / Modified Output",text:"<span class='kw3'>Modified output</span> and <span class='kw3'>pushed output</span> refer to the same concept — any learner utterance that has been corrected following teacher feedback.",ans:false,correct:"<span class='kw2'>Not all pushed output is modified output</span>. <span class='kw3'>Pushed output</span> = T pushes S toward correct form. <span class='kw3'>Modified output</span> = whether the output was <span class='kw2'>actually corrected</span>.",why:"Pushed output은 교사가 학생의 발화를 올바른 방향으로 밀어붙이는 과정을 말하고, Modified output은 실제로 수정이 이루어졌는지에 초점을 맞춥니다.",source:"\"Not all pushed output is modified output. <span class='kw3'>Pushed output</span>: T pushes toward correct form. <span class='kw3'>Modified output</span>: whether actually <span class='kw2'>corrected</span>.\"",compare:[{title:"<span class='kw3'>Pushed output</span>",desc:"T pushes · process"},{title:"<span class='kw3'>Modified output</span>",desc:"actually <span class='kw2'>corrected</span> · result"},{title:"<span class='kw3'>Uptake</span>",desc:"<span class='kw2'>immediately follows</span> feedback"}]},
  {src:"Corrective Feedback",cat:"Sociocultural Implication",text:"From a Sociocultural Theory perspective, corrective feedback should be delivered all at once for maximum effect, as gradual correction may confuse learners.",ans:false,correct:"Sociocultural Theory: corrective feedback should be provided <span class='kw2'>step by step as scaffolding</span>, taking the form of <span class='kw2'>other-regulation</span> to help L achieve <span class='kw2'>self-regulation</span>.",why:"사회문화 이론의 관점에서 corrective feedback은 other-regulation의 형태로 self-regulation 달성을 돕고, ZPD 내에서 scaffolding으로 단계적으로 제공되어야 합니다.",source:"\"CF from Sociocultural Theory: 1) <span class='kw2'>other-regulation</span> → self-regulation. 2) <span class='kw2'>step by step as scaffolding</span>. 3) facilitates <span class='kw2'>ZPD</span>.\"",compare:[{title:"<span class='kw2'>Other-regulation</span>",desc:"feedback → towards self-regulation"},{title:"<span class='kw2'>Step by step</span>",desc:"scaffolding · within ZPD"}]},
  {src:"Error Analysis",cat:"Source of Error",text:"<span class='kw1'>Induced errors</span> are caused by the learner's L1 interfering with the target language, making them a type of interlingual transfer error.",ans:false,correct:"<span class='kw1'>Induced errors</span> are caused by <span class='kw2'>faulty teaching or misleading textbook presentation</span> — not L1 interference. That would be <span class='kw4'>interference</span>.",why:"Source of error 4가지: ① Interlingual transfer(interference) ② Intralingual transfer(overgeneralization) ③ Context of learning(induced error — teacher/textbook) ④ Communication strategies. Induced errors는 교사의 잘못된 설명이나 교재의 오류로 인해 발생합니다.",source:"\"<span class='kw1'>Induced errors</span>: caused by Ls' faulty hypotheses due to <span class='kw2'>teachers' misleading explanation or faulty presentation in textbooks</span>.\"",compare:[{title:"<span class='kw4'>Interference</span>",desc:"L1 → L2 transfer · interlingual"},{title:"<span class='kw1'>Induced error</span>",desc:"<span class='kw2'>teacher/textbook</span> → wrong hypothesis"}]}
];
function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`<div class="sec-label">📊 비교 정리</div><div class="compare${three?' three':''}">${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}</div>`:'';
  return `<div class="exp show"><div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div><div class="exp-answer"><div class="ans-label">핵심 정정</div><div class="ans-text">${q.correct}</div></div><div class="exp-body"><div class="sec-label">📖 상세 설명</div><p>${q.why}</p><div class="sec-label">📌 Source</div><div class="def-box"><p>${q.source}</p></div>${cmp}</div></div>`;
}
function renderNav(){
  document.getElementById('nav').innerHTML=answers.map((a,i)=>{
    let cls='nd';
    if(i===cur)cls+=' cur';
    else if(a!==null)cls+=a.correct?' ok':' ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button></div><div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div><div>${renderExp(q,a.correct)}</div><button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }else{
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button></div><div id="bd" class="badge"></div><div id="ep"></div><button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }
}
function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();saveProgress();
}
function next(){cur++;saveProgress();render();}
function jumpTo(i){cur=i;render();document.getElementById('qa').scrollIntoView({behavior:'smooth',block:'start'});}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers}));}
function freshStart(){localStorage.removeItem(SAVE_KEY);cur=0;answers=new Array(TOTAL).fill(null);document.getElementById('rb').style.display='none';document.getElementById('sc').classList.remove('show');document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    const done=answers.filter(a=>a!==null).length;
    if(done>0){document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;document.getElementById('rb').style.display='block';}
  }
  renderNav();render();
})();
</script>
<script src="./score-popup.js"></script>
<script src="./sounds.js"></script>
</body>

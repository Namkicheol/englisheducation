.ci-title{font-size:11px;font-family:'JetBrains Mono',monospace;color:#1b5e3a;font-weight:700;margin-bottom:5px}

.next-btn{display:none;width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#2e7d52,#26a69a);border:none;border-radius:10px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .2s}
.next-btn:hover{opacity:.88;transform:translateY(-1px)}
.next-btn.show{display:block;animation:fade .3s ease}
.score-card{display:none;text-align:center;padding:48px 24px}
.score-card.show{display:block;animation:up .5s ease}
.score-circle{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,#2e7d52,#26a69a);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 40px rgba(46,125,82,.3)}
.s-num{font-size:42px;font-weight:700;line-height:1;color:#fff}
.s-total{font-size:14px;opacity:.85;color:#fff}
.score-card h2{font-size:24px;margin-bottom:7px;color:#1a3326}
.score-card p{color:#4a7a62;margin-bottom:24px;font-size:15px}
.restart-btn{padding:13px 32px;background:#f5fdf8;border:2px solid #2e7d52;border-radius:10px;color:#2e7d52;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.restart-btn:hover{background:rgba(46,125,82,.1)}
.nd{width:28px;height:28px;border-radius:6px;border:1.5px solid #b2dfcc;background:#f5fdf8;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;color:#4a7a62;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;font-weight:600}
.nd.cur{border-color:#2e7d52;background:#2e7d52;color:white}
.nd.ok{border-color:#2e7d52;background:rgba(46,125,82,.15);color:#1b5e3a}
.nd.ng{border-color:#c62828;background:rgba(198,40,40,.1);color:#c62828}
.nd:hover:not(.cur){opacity:.7}
#nav{display:flex;flex-wrap:wrap;gap:5px;max-width:720px;margin:0 auto 16px;padding:0 8px}
</style>

<script>
const Q=[
  {src:"Background / Paused Listening",cat:"Schematic Knowledge",
   text:"<span class='kw1'>Paused listening tasks</span> divide a recording into segments with regular pauses, during which students write down what they believe the topic is. This technique activates <span class='kw2'>content schemata</span> and is considered a form of <span class='kw2'>scaffolding</span> that enhances <span class='kw1'>metacognitive awareness</span>.",
   ans:true,
   correct:"<span class='kw1'>Paused listening tasks</span>는 녹음을 여러 구간으로 나눠 각 pause마다 학생이 주제를 적습니다. <span class='kw2'>content schemata</span> 활성화와 <span class='kw1'>metacognitive awareness</span>를 높이는 <span class='kw2'>scaffolding</span>의 일종입니다.",
   why:"The lack of shared <span class='kw1'>schematic knowledge</span> makes comprehension difficult or even impossible. Each pause prompts learners to consciously monitor and revise their understanding — a core <span class='kw2'>metacognitive</span> function. Clues activate competing <span class='kw1'>content schemata</span> as the recording progresses.",
   source:"\"<span class='kw1'>Paused listening tasks</span>: An effective technique that shows the presence of relevant <span class='kw2'>schematic knowledge</span> facilitates comprehension. Pausing can be interpreted as a kind of <span class='kw2'>scaffolding</span> that enhances Ss' <span class='kw1'>metacognitive awareness</span>.\"",
   compare:[{title:"<span class='kw1'>Content schemata</span>",desc:"<span class='kw2'>world/topic knowledge</span> · 내용 배경지식"},{title:"<span class='kw1'>Formal schemata</span>",desc:"<span class='kw2'>rhetorical/discourse structure</span> · 형식 지식"}]},

  {src:"Input",cat:"Roughly-tuned vs Finely-tuned",
   text:"<span class='kw1'>Finely-tuned input</span> is closer to the natural usage of language and only approximately adjusted to learner proficiency, while <span class='kw1'>roughly-tuned input</span> is carefully controlled to include only previously covered structures and vocabulary.",
   ans:false,
   correct:"The two definitions are <span class='kw2'>reversed</span>. <span class='kw1'>Roughly-tuned input</span> ≈ <span class='kw2'>natural usage</span>; <span class='kw1'>finely-tuned input</span> = <span class='kw2'>carefully controlled</span>.",
   why:"<span class='kw1'>Roughly-tuned input</span>은 학습자 숙달도에 대략적으로 맞춘, <span class='kw2'>자연스러운 언어</span>에 가까운 입력입니다. <span class='kw1'>Finely-tuned input</span>은 학습자가 이미 배운 구조와 어휘만 포함하도록 <span class='kw2'>세심하게 통제</span>되어 목표 문법의 명확한 예시를 제공합니다.",
   source:"\"<span class='kw1'>Roughly-tuned input</span>: Input that is only accustomed at approximate level of Ss' proficiency. This is closer to <span class='kw2'>natural usage of lg</span>. / <span class='kw1'>Finely-tuned input</span>: Input that is more <span class='kw2'>carefully controlled</span> to only include the structures and vocabulary that Ss have covered.\"",
   compare:[{title:"<span class='kw1'>Roughly-tuned</span>",desc:"≈ <span class='kw2'>natural usage</span> · authentic · focus on meaning"},{title:"<span class='kw1'>Finely-tuned</span>",desc:"<span class='kw2'>carefully controlled</span> · graded · target grammar 제시"}]},

  {src:"Input",cat:"Concocted Texts",
   text:"Unnaturally lowering speech rate is an effective way to make listening input accessible, as it maintains the natural features of spoken language while reducing difficulty.",
   ans:false,
   correct:"Unnatural slow speed <span class='kw2'>damages text authenticity</span>. Inserting <span class='kw1'>pauses between phrases and sentences</span> is the better alternative.",
   why:"속도를 부자연스럽게 낮추면 <span class='kw2'>clustering</span>, <span class='kw2'>reduced forms</span> 등 구어의 자연스러운 특성이 손상됩니다. <span class='kw1'>Concocted texts</span>도 <span class='kw2'>false expectation</span>을 형성해 교실 밖 genuine experience로의 transfer를 방해합니다. <span class='kw1'>Authentic texts</span>는 자연스러운 언어 사용과 실생활 듣기 경험을 제공합니다.",
   source:"\"Unnaturally lower speed of speech <span class='kw2'>damages text authenticity</span>. Putting <span class='kw1'>pauses between phrases and sentences</span> is better. / <span class='kw1'>Concocted texts</span> give <span class='kw2'>false expectation</span> about real-life listening experiences.\"",
   compare:[{title:"❌ <span class='kw2'>Unnatural slow speed</span>",desc:"authenticity 손상 · false expectation"},{title:"✅ <span class='kw1'>Pauses between phrases</span>",desc:"authenticity 유지 · 이해도↑"}]},

  {src:"Authentic Materials",cat:"3 Strategies",
   text:"<span class='kw1'>Grading the texts</span> provides graduated listening activities that require learners to build up understanding little by little, starting with simpler tasks and progressing toward more demanding ones.",
   ans:false,
   correct:"That describes <span class='kw1'>staging the listening</span>. <span class='kw1'>Grading the texts</span> means sequencing authentic texts from <span class='kw2'>more accessible → more advanced</span>.",
   why:"세 전략을 정확히 구분해야 합니다. <span class='kw1'>Simplifying the tasks</span>: <span class='kw2'>task</span>를 단순화(lg 유지). <span class='kw1'>Grading the texts</span>: 텍스트 자체를 <span class='kw2'>수준별로 배열</span>. <span class='kw1'>Staging the listening</span>: 같은 텍스트에 대해 활동을 <span class='kw2'>점진적으로</span> 구성.",
   source:"\"<span class='kw1'>Grading the texts</span>: T can collect a large enough sample of authentic speeches and <span class='kw2'>sequence them</span> from the text which is more accessible to lower-level Ls to what is more appropriate to advanced Ls. / <span class='kw1'>Staging the listening</span>: This provides <span class='kw2'>graduated activities</span> which require Ls to build up an understanding of the recording little by little.\"",
   compare:[{title:"<span class='kw1'>Simplifying tasks</span>",desc:"<span class='kw2'>task</span> 단순화 · input 유지"},{title:"<span class='kw1'>Grading texts</span>",desc:"<span class='kw2'>텍스트</span> 난이도 순 배열"},{title:"<span class='kw1'>Staging listening</span>",desc:"<span class='kw2'>활동</span> 점진적 구성"}]},

  {src:"Functions of Listening",cat:"Transactional vs Interactional",
   text:"<span class='kw1'>Interactional language function</span> is <span class='kw2'>person-oriented</span> and promotes social relationships, with <span class='kw2'>phatic communion</span> (e.g. 'Nice day, isn't it?') as a typical example.",
   ans:true,
   correct:"<span class='kw1'>Interactional function</span>은 <span class='kw2'>person-oriented</span>로 사회적 관계 유지가 목적입니다. <span class='kw1'>Transactional function</span>은 <span class='kw2'>message-oriented</span>로 정보 전달이 목적입니다.",
   why:"맵핑 자료에서 <span class='kw1'>interactional talk</span> = <span class='kw2'>social type</span>, person-oriented, small talk / <span class='kw1'>transactional talk</span> = <span class='kw2'>business type</span>, factual information, message-oriented로 정리됩니다. <span class='kw2'>Phatic communion</span>은 내용 전달보다 사회적 관계 유지를 목적으로 하는 전형적인 interactional function의 예입니다.",
   source:"\"<span class='kw1'>Interactional language function</span>: A function of spoken texts whose objective is to <span class='kw2'>promote social relationship</span> between interlocutors; <span class='kw2'>person-oriented</span>. <span class='kw1'>Phatic communion</span> (e.g. Nice day, isn't it?)\"",
   compare:[{title:"<span class='kw1'>Transactional</span>",desc:"<span class='kw2'>message-oriented</span> · factual info · confirmation checks"},{title:"<span class='kw1'>Interactional</span>",desc:"<span class='kw2'>person-oriented</span> · social relations · phatic communion"}]},

  {src:"Processing",cat:"Bottom-up Processing",
   text:"In <span class='kw1'>bottom-up processing</span>, listeners actively reconstruct the speaker's meaning by drawing on <span class='kw2'>prior knowledge</span> of context and situation, relying on <span class='kw2'>extralinguistic skills</span>.",
   ans:false,
   correct:"This describes <span class='kw1'>top-down processing</span>. <span class='kw1'>Bottom-up</span> decodes sounds <span class='kw2'>linearly</span> from <span class='kw2'>parts → whole</span>, focusing on linguistic form.",
   why:"<span class='kw1'>Bottom-up processing</span>은 소리를 <span class='kw2'>선형적(linear)</span>으로 해독하여 부분에서 전체로 의미를 파악하며 <span class='kw2'>언어 형태(form)</span>에 초점을 둡니다. <span class='kw1'>Top-down processing</span>은 <span class='kw2'>prior knowledge</span>와 context를 활용해 의미를 재구성하며 <span class='kw2'>extralinguistic skills</span>에 의존합니다.",
   source:"\"<span class='kw1'>Bottom-up Processing</span>: Listening is a process of <span class='kw2'>decoding the sounds</span> that one hears in a <span class='kw2'>linear fashion</span>. Moving from the <span class='kw2'>parts to the whole</span>. / <span class='kw1'>Top-down Processing</span>: Ls actively reconstruct the original meaning of the speaker using incoming sounds as clues. Ls use <span class='kw2'>prior knowledge</span> of the context and situation.\"",
   compare:[{title:"<span class='kw1'>Bottom-up</span>",desc:"<span class='kw2'>parts → whole</span> · linear · form 초점 · listening for details"},{title:"<span class='kw1'>Top-down</span>",desc:"<span class='kw2'>prior knowledge</span> + context · reconstruct meaning · global strategies"}]},

  {src:"Processing",cat:"Interactive Processing",
   text:"In a level-differentiated lesson using <span class='kw1'>interactive processing</span>, beginning learners should focus on <span class='kw2'>top-down</span> while advanced learners focus on <span class='kw2'>bottom-up</span> processing.",
   ans:false,
   correct:"Reversed: <span class='kw1'>beginners</span> → <span class='kw2'>bottom-up</span>; <span class='kw1'>advanced learners</span> → <span class='kw2'>top-down</span>.",
   why:"<span class='kw1'>초급 학습자(beginners)</span>는 개별 음소·단어 해독(<span class='kw2'>bottom-up</span>)이 먼저 필요하고, <span class='kw1'>고급 학습자(advanced Ls)</span>는 배경지식과 맥락을 활용한 전체 의미 파악(<span class='kw2'>top-down</span>)에 초점을 둘 수 있습니다. <span class='kw1'>Interactive processing</span>은 두 방식을 동시에 사용하므로 다양한 학습 스타일과 <span class='kw2'>수준 차이(level-differentiated)</span> 학급에 적합합니다.",
   source:"\"<span class='kw1'>Interactive Processing</span>: Appropriate for <span class='kw2'>level-differentiated lesson</span> as <span class='kw1'>beginners</span> can focus on <span class='kw2'>bottom-up processing</span> and <span class='kw1'>advanced Ls</span> can focus on <span class='kw2'>top-down processing</span>.\"",
   compare:[{title:"<span class='kw1'>Beginners</span>",desc:"→ <span class='kw2'>bottom-up</span> · 음소·단어 해독 우선"},{title:"<span class='kw1'>Advanced Ls</span>",desc:"→ <span class='kw2'>top-down</span> · 배경지식·맥락 활용"}]},

  {src:"Types of Listening Practice",cat:"Reactive vs Responsive",
   text:"<span class='kw1'>Responsive listening</span> is a technique where students simply listen to the surface structure of an utterance and repeat it back to the teacher.",
   ans:false,
   correct:"That describes <span class='kw1'>reactive listening</span>. <span class='kw1'>Responsive listening</span>: students make an <span class='kw2'>appropriate response</span> to the teacher's short utterance — T '<span class='kw2'>pushes</span>' output.",
   why:"두 개념의 혼동이 자주 일어납니다. <span class='kw1'>Reactive</span>는 단순 <span class='kw2'>반복(repeat back)</span>, <span class='kw1'>Responsive</span>는 교사의 짧은 발화에 <span class='kw2'>적절한 반응</span>을 만드는 것으로 T가 <span class='kw2'>output을 push</span>합니다. <span class='kw1'>Interactive</span>는 speaking과 통합된 <span class='kw2'>authentic give-and-take</span> 활동입니다.",
   source:"\"<span class='kw1'>Reactive Listening</span>: Ss simply listen to the surface structure of an utterance to <span class='kw2'>repeat it back</span> to the T. / <span class='kw1'>Responsive Listening</span>: Ss listen to the T's short utterance and make <span class='kw2'>appropriate response</span> to them. T '<span class='kw2'>pushes</span>' output from Ls.\"",
   compare:[{title:"<span class='kw1'>Reactive</span>",desc:"<span class='kw2'>repeat back</span> · surface structure"},{title:"<span class='kw1'>Responsive</span>",desc:"<span class='kw2'>appropriate response</span> · T pushes output"},{title:"<span class='kw1'>Interactive</span>",desc:"speaking 통합 · authentic give and take"}]},

  {src:"Types of Listening Practice",cat:"Selective vs Intensive",
   text:"<span class='kw1'>Selective listening</span> is similar to <span class='kw2'>scanning</span>, suits <span class='kw2'>field-independent</span> learners, and involves a <span class='kw2'>shorter</span> discourse than <span class='kw1'>intensive listening</span>.",
   ans:false,
   correct:"<span class='kw1'>Selective listening</span> involves <span class='kw2'>longer</span> discourse than <span class='kw1'>intensive listening</span>. The rest is correct.",
   why:"<span class='kw1'>Selective listening</span>은 사전에 계획된 목적으로 특정 정보를 수집하는 활동으로 <span class='kw2'>scanning</span>과 유사하고 <span class='kw2'>field-independent</span> 학습자에게 적합합니다. 담화가 <span class='kw2'>길다(longer)</span>는 점이 <span class='kw1'>intensive listening</span>(짧은 텍스트 반복 재생)과의 핵심 차이입니다.",
   source:"\"<span class='kw1'>Selective Listening</span>: Listening with a <span class='kw2'>planned purpose</span> in mind in order to gather specific information. Similar with <span class='kw2'>scanning</span>. Different from <span class='kw1'>intensive listening</span> as the discourse is <span class='kw2'>longer</span>.\"",
   compare:[{title:"<span class='kw1'>Selective</span>",desc:"planned purpose · scanning 유사 · <span class='kw2'>longer</span> discourse"},{title:"<span class='kw1'>Intensive</span>",desc:"repeated replay · language analysis · <span class='kw2'>shorter</span> text"}]},

  {src:"Listening Strategies",cat:"Monitoring vs Evaluating",
   text:"<span class='kw1'>Monitoring</span> is a <span class='kw2'>post-listening</span> strategy where learners check overall comprehension after the task, while <span class='kw1'>evaluating</span> occurs <span class='kw2'>during listening</span> to confirm predictions.",
   ans:false,
   correct:"<span class='kw1'>Monitoring</span> = <span class='kw2'>while-listening</span> (predictions 검증). <span class='kw1'>Evaluating</span> = <span class='kw2'>post-listening</span> (이해도 점검). 두 개념이 뒤바뀌었습니다.",
   why:"<span class='kw1'>Monitoring</span>은 <span class='kw2'>while-listening</span> 단계에서 이해 여부를 확인하고 <span class='kw2'>predictions의 정확도</span>를 검증합니다. <span class='kw1'>Evaluating</span>은 <span class='kw2'>post-listening</span> 단계에서 전체 이해도를 점검하는 전략입니다. 세 <span class='kw2'>metacognitive</span> 전략의 단계 구분이 핵심입니다.",
   source:"\"<span class='kw1'>Monitoring</span>: To notice what Ss do and do not understand and <span class='kw2'>confirm predictions</span>; This happens <span class='kw2'>while-listening</span>. / <span class='kw1'>Evaluating</span>: To check on how well they understood; usually done at the <span class='kw2'>post-listening stage</span>.\"",
   compare:[{title:"<span class='kw1'>Predicting</span>",desc:"<span class='kw2'>pre-listening</span> · schemata 활성화"},{title:"<span class='kw1'>Monitoring</span>",desc:"<span class='kw2'>while-listening</span> · predictions 검증"},{title:"<span class='kw1'>Evaluating</span>",desc:"<span class='kw2'>post-listening</span> · 이해도 점검"}]},

  {src:"Listening Strategies",cat:"Inferencing vs Scanning",
   text:"<span class='kw1'>Inferencing</span> means picking out one or two pieces of specific information from a discourse without needing to understand every word.",
   ans:false,
   correct:"That describes <span class='kw1'>scanning</span>. <span class='kw1'>Inferencing</span> = listening <span class='kw2'>between the lines</span> when information is incomplete — going beyond factual info to analyze, interpret, and evaluate.",
   why:"<span class='kw1'>Scanning</span>은 전체를 이해하지 않고 <span class='kw2'>특정 정보</span>를 골라 듣는 것입니다. <span class='kw1'>Inferencing</span>은 불완전한 정보를 바탕으로 <span class='kw2'>행간의 의미</span>를 추론하는 전략으로, 텍스트 또는 <span class='kw2'>general world knowledge</span>를 기반으로 <span class='kw2'>분석·해석·평가</span>합니다.",
   source:"\"<span class='kw1'>Scanning</span>: To figure out <span class='kw2'>one or two pieces of specific information</span> in a discourse without understanding every word. / <span class='kw1'>Inferencing</span>: Listening <span class='kw2'>between the lines</span> when information is incomplete; Ss go beyond the factual information, and <span class='kw2'>analyze, interpret, and evaluate</span> the meaning.\"",
   compare:[{title:"<span class='kw1'>Scanning</span>",desc:"specific info 추출 · <span class='kw2'>without every word</span>"},{title:"<span class='kw1'>Inferencing</span>",desc:"<span class='kw2'>between the lines</span> · analyze/interpret/evaluate"}]},

  {src:"Format of Listening Lesson",cat:"Pre-listening",
   text:"In pre-listening, <span class='kw1'>signposting questions</span> are created by students after being given a title, while <span class='kw1'>generating questions</span> are pre-set by the teacher to guide students in the right direction.",
   ans:false,
   correct:"Reversed. <span class='kw1'>Signposting Qs</span> = <span class='kw2'>teacher-provided</span> guide Qs. <span class='kw1'>Generating Qs</span> = <span class='kw2'>students create</span> Qs from a given title.",
   why:"<span class='kw1'>Signposting questions</span>는 교사가 학생들을 <span class='kw2'>올바른 방향으로 안내</span>하기 위해 미리 제공하는 질문입니다. <span class='kw1'>Generating questions</span>는 학생이 제목을 받고 스스로 최대한 많은 질문을 생성하는 <span class='kw2'>learner-centered</span> 활동으로 듣기의 <span class='kw2'>목적의식과 동기</span>를 높입니다.",
   source:"\"Creating Ss' motivation: a) <span class='kw1'>Signposting Qs</span>: Provide these to <span class='kw2'>guide Ss in the right direction</span>, b) <span class='kw1'>Generating Qs</span>: Ss are given a title and they <span class='kw2'>create as many Qs as possible</span>.\"",
   compare:[{title:"<span class='kw1'>Signposting Qs</span>",desc:"<span class='kw2'>T-provided</span> · guide direction · preset"},{title:"<span class='kw1'>Generating Qs</span>",desc:"<span class='kw2'>S-created</span> · title 제공 → S가 질문 생성"}]},

  {src:"Listening Activities",cat:"Dictation vs Dictogloss",
   text:"<span class='kw1'>Dictation</span> is a collaborative task where learners work together to reconstruct a text presented orally, utilizing both <span class='kw2'>bottom-up</span> and <span class='kw2'>top-down</span> strategies.",
   ans:false,
   correct:"That describes <span class='kw1'>dictogloss</span>. <span class='kw1'>Dictation</span> = <span class='kw2'>imitative writing activity</span>, aims at producing an <span class='kw2'>exact replica</span> — unnatural, no regard for meaning.",
   why:"<span class='kw1'>Dictation</span>은 교사가 <span class='kw2'>짧은 구 단위</span>로 읽어주면 학생이 그대로 받아쓰는 <span class='kw2'>모방적(imitative)</span> 활동으로 <span class='kw2'>의미와 무관</span>합니다. <span class='kw1'>Dictogloss</span>는 구두 제시 텍스트를 학습자들이 <span class='kw2'>협력하여 재구성</span>하는 collaborative 활동으로 <span class='kw2'>bottom-up(세부 청취) + top-down(의미 재구성)</span>을 모두 활용합니다.",
   source:"\"<span class='kw1'>Dictation</span>: an <span class='kw2'>imitative writing activity</span>... to generate an <span class='kw2'>exact/accurate replica</span>. It is unnatural and has <span class='kw2'>no regard in meaning</span>. / <span class='kw1'>Dictogloss</span>: A <span class='kw2'>collaborative outcome task</span> where Ls work together to produce lg forms and reproduce content collaboratively by <span class='kw2'>reconstructing a text</span>.\"",
   compare:[{title:"<span class='kw1'>Dictation</span>",desc:"<span class='kw2'>exact replica</span> · imitative · no meaning"},{title:"<span class='kw1'>Dictogloss</span>",desc:"<span class='kw2'>collaborative</span> · reconstruct · B-U + T-D"}]},

  {src:"Listening Activities",cat:"Information Transfer",
   text:"<span class='kw1'>Information transfer</span> requires learners to transform information from one mode to another — transferring aurally perceived information to a <span class='kw2'>visual representation</span> — which encourages <span class='kw2'>deep processing</span>.",
   ans:true,
   correct:"<span class='kw1'>Information transfer</span>는 청각 정보를 시각적 표현으로 변환하는 기법으로, <span class='kw2'>deep processing</span>을 촉진하며 <span class='kw2'>scanning / selective listening</span>에 활용됩니다.",
   why:"Aural → visual 변환 과정에서 <span class='kw2'>mental effort</span>가 높아져 <span class='kw1'>deep processing</span>이 유발됩니다. <span class='kw2'>Visual support</span>는 이해를 돕고, <span class='kw2'>integrative activity</span>의 한 유형입니다. 맵핑에서 'transferring <span class='kw2'>aural information to a visual representation</span> (integrative)'로 정리됩니다.",
   source:"\"<span class='kw1'>Information Transfer</span>: A technique which requires Ss to <span class='kw2'>reinterpret and transform the information from one mode to another</span>. Encourages <span class='kw1'>deep processing</span> of input by requiring Ss to transform the input in a way that promotes more <span class='kw2'>mental effort</span>.\"",
   compare:[{title:"<span class='kw1'>Information transfer</span>",desc:"aural → <span class='kw2'>visual</span> · deep processing · integrative"},{title:"<span class='kw1'>Dictogloss</span>",desc:"aural → <span class='kw2'>written reconstruction</span> · collaborative"}]},

  {src:"Principles for Teaching Listening",cat:"Learner Level",
   text:"According to the principles for teaching listening, <span class='kw2'>strategy instruction</span> should begin with <span class='kw1'>beginning learners</span> to help them develop effective listening habits from the start.",
   ans:false,
   correct:"Strategies should <span class='kw2'>NOT</span> be taught to <span class='kw1'>beginners</span>. Strategy instruction is for <span class='kw1'>intermediate learners</span>. Beginners need <span class='kw2'>variety of tasks</span> and <span class='kw2'>building on success</span>.",
   why:"<span class='kw1'>초급 학습자</span>에게는 전략 지도보다 <span class='kw2'>다양한 과제</span>와 <span class='kw2'>성공 경험(build on success)</span>이 우선입니다 (cf. <span class='kw2'>threshold hypothesis</span>). <span class='kw1'>중급 학습자</span>에게 <span class='kw2'>listening strategies</span>를 가르치고, <span class='kw1'>고급 학습자</span>에게는 <span class='kw2'>문화 지도</span>와 <span class='kw2'>긴 텍스트 구조</span> 이해를 강조합니다.",
   source:"\"To <span class='kw1'>beginning Ls</span>: Use a variety of tasks / <span class='kw2'>Build on success</span> / <span class='kw2'>Do not teach strategies</span>. / To <span class='kw1'>intermediate Ls</span>: <span class='kw2'>Teach listening strategies</span> / Balance listening as comprehension practice and listening for acquisition.\"",
   compare:[{title:"<span class='kw1'>Beginners</span>",desc:"variety of tasks · <span class='kw2'>build on success</span> · NO strategies"},{title:"<span class='kw1'>Intermediate</span>",desc:"<span class='kw2'>teach strategies</span> · balance comp. & acquisition"},{title:"<span class='kw1'>Advanced</span>",desc:"teach <span class='kw2'>culture</span> · longer text structure"}]},

  {src:"Types of Listening Practice",cat:"Extensive Listening",
   text:"<span class='kw1'>Extensive listening</span> involves listening to short texts repeatedly in order to decode input for language analysis, and helps students develop <span class='kw2'>bottom-up</span> processing skills.",
   ans:false,
   correct:"That describes <span class='kw1'>intensive listening</span>. <span class='kw1'>Extensive listening</span> = listening to <span class='kw2'>longer stretches</span> of speech for general understanding, developing <span class='kw2'>top-down</span> skills.",
   why:"<span class='kw1'>Extensive listening</span>은 몇 분간 긴 내용을 들으며 전체적인 이해를 목표로 하고 <span class='kw2'>top-down skills</span>를 발달시킵니다. <span class='kw1'>Intensive listening</span>은 짧은 텍스트를 <span class='kw2'>반복 재생</span>하며 언어 분석이나 특정 전략 연습에 활용합니다.",
   source:"\"<span class='kw1'>Extensive listening</span>: Listening to a <span class='kw2'>longer stretch of speech</span> for several minutes at a time, usually with a long-term goal of appreciating the content; Ss develop <span class='kw2'>top-down skills</span>. / <span class='kw1'>Intensive Listening</span>: Listening to a text <span class='kw2'>repeatedly</span> to decode the input for lg analysis or practice in specific listening strategies.\"",
   compare:[{title:"<span class='kw1'>Extensive listening</span>",desc:"<span class='kw2'>longer stretch</span> · general understanding · <span class='kw2'>top-down</span>"},{title:"<span class='kw1'>Intensive listening</span>",desc:"<span class='kw2'>repeated replay</span> · language analysis · <span class='kw2'>bottom-up</span>"}]},

  {src:"Listening Strategies",cat:"Predicting",
   text:"<span class='kw1'>Predicting</span> is a listening strategy in which learners talk about the content they are about to hear, which activates their <span class='kw2'>schemata</span> and facilitates comprehension.",
   ans:true,
   correct:"<span class='kw1'>Predicting</span>은 듣기 전 내용을 예측하며 <span class='kw2'>schemata를 활성화</span>하고 <span class='kw2'>comprehension을 촉진</span>하는 <span class='kw2'>pre-listening</span> 단계의 핵심 전략입니다.",
   why:"<span class='kw1'>Predicting</span>은 학습자가 들을 내용에 대해 이야기함으로써 관련 <span class='kw2'>schemata</span>를 활성화하고 이해를 준비시킵니다. 이는 <span class='kw2'>pre-listening</span>의 핵심 활동이며, 이후 <span class='kw1'>monitoring</span>(while-listening에서 예측 검증)으로 자연스럽게 이어집니다.",
   source:"\"<span class='kw1'>Predicting</span>: To talk about the content that Ss are about to hear; this <span class='kw2'>activates Ss' schemata</span> and facilitates their comprehension.\"",
   compare:[{title:"<span class='kw1'>Predicting</span>",desc:"<span class='kw2'>pre-listening</span> · schemata 활성화 · comprehension 준비"},{title:"<span class='kw1'>Monitoring</span>",desc:"<span class='kw2'>while-listening</span> · predictions 검증"},{title:"<span class='kw1'>Evaluating</span>",desc:"<span class='kw2'>post-listening</span> · 이해도 점검"}]},

  {src:"Listening Strategies",cat:"Gist vs Detail",
   text:"<span class='kw1'>Gist listening</span> aims to find out several pieces of detailed information after intensively listening to a text, while <span class='kw1'>listening for detail</span> is only about understanding the topic.",
   ans:false,
   correct:"Reversed. <span class='kw1'>Gist listening</span> = understand <span class='kw2'>only the topic</span>. <span class='kw1'>Listening for detail</span> = find out <span class='kw2'>several pieces of detailed information</span> intensively.",
   why:"<span class='kw1'>Gist listening</span>은 전체 주제만 파악하는 global 전략입니다. <span class='kw1'>Listening for detail</span>은 텍스트를 집중적으로 들으며 여러 세부 정보를 파악하는 전략입니다. <span class='kw1'>Scanning</span>은 한두 가지 특정 정보만 골라 듣는 것으로 이 셋을 구분해야 합니다.",
   source:"\"<span class='kw1'>Gist listening</span>: To understand <span class='kw2'>only a topic</span>. / <span class='kw1'>Listening for detail</span>: To find out <span class='kw2'>several pieces of detailed information</span> after intensively listening to a text.\"",
   compare:[{title:"<span class='kw1'>Gist listening</span>",desc:"<span class='kw2'>topic only</span> · global understanding"},{title:"<span class='kw1'>Scanning</span>",desc:"<span class='kw2'>1~2 specific info</span> · without every word"},{title:"<span class='kw1'>Listening for detail</span>",desc:"<span class='kw2'>several details</span> · intensive"}]},

  {src:"Listening Strategies",cat:"Clarifying",
   text:"<span class='kw1'>Clarifying</span> is a listening strategy where learners ask questions and give feedback to the speaker in order to enhance understanding, such as saying 'What does _____ mean?' or 'You mean _____?'",
   ans:true,
   correct:"<span class='kw1'>Clarifying</span>은 이해를 높이기 위해 화자에게 <span class='kw2'>질문하거나 피드백을 제공</span>하는 전략으로, 상호작용적 듣기 상황에서 사용됩니다.",
   why:"<span class='kw1'>Clarifying</span>은 단순히 듣는 것을 넘어 화자와 <span class='kw2'>상호작용</span>하며 이해를 높이는 전략입니다. 이는 <span class='kw1'>negotiation of meaning</span>과도 연결되며, <span class='kw1'>interactive listening</span>의 핵심 요소입니다.",
   source:"\"<span class='kw1'>Clarifying</span>: To ask Qs and give feedback to the speaker in order to <span class='kw2'>enhance the understanding</span>. (What does _______ mean? You mean ________?)\"",
   compare:[{title:"<span class='kw1'>Clarifying</span>",desc:"ask Qs + give feedback · <span class='kw2'>interactive</span>"},{title:"<span class='kw1'>Monitoring</span>",desc:"self-check · <span class='kw2'>internal</span> process"}]},

  {src:"Format of Listening Lesson",cat:"Pre-teaching Vocabulary",
   text:"In the pre-listening stage, teachers should pre-teach <span class='kw2'>all unknown words</span> in the text to ensure students are fully prepared before listening.",
   ans:false,
   correct:"Teachers should <span class='kw2'>NOT pre-teach all unknown words</span>. Teach only <span class='kw1'>critical vocabulary</span>, and teach not only words but also <span class='kw2'>lexical chunks</span>.",
   why:"모든 모르는 단어를 미리 가르치면 오히려 <span class='kw2'>authenticity</span>가 손상되고 실제 듣기 능력 개발이 방해됩니다. <span class='kw1'>Critical vocabulary</span>만 선별하여 가르치되, 단어뿐 아니라 <span class='kw2'>lexical chunks</span>(어휘 덩어리)도 함께 지도해야 합니다.",
   source:"\"<span class='kw1'>Pre-teaching critical vocabulary</span>: Facilitates comprehension, lowers the difficulty of the text. <span class='kw2'>Do not pre-teach all the unknown words</span>; teach not only words but also <span class='kw2'>lexical chunks</span>.\"",
   compare:[{title:"✅ <span class='kw1'>Critical vocab only</span>",desc:"선별적 지도 · <span class='kw2'>lexical chunks</span> 포함"},{title:"❌ <span class='kw2'>All unknown words</span>",desc:"authenticity 손상 · 과도한 pre-teaching"}]},

  {src:"Format of Listening Lesson",cat:"While-listening",
   text:"In the <span class='kw1'>while-listening</span> stage, the <span class='kw2'>extensive listening phase</span> comes after the intensive listening phase — students first listen for specific details, then confirm their general understanding.",
   ans:false,
   correct:"<span class='kw2'>Extensive phase</span> comes <span class='kw2'>first</span> (general idea + confirm predictions), then <span class='kw2'>intensive phase</span> (specific info with pre-set Qs).",
   why:"While-listening은 <span class='kw1'>extensive phase</span>(전체 내용 파악 + 예측 확인) → <span class='kw1'>intensive phase</span>(pre-set Qs 제공 후 세부 정보 파악) 순서로 진행됩니다. 큰 그림을 먼저 잡고 세부사항으로 좁혀가는 <span class='kw2'>top-down → bottom-up</span> 흐름입니다.",
   source:"\"<span class='kw1'>Extensive listening phase</span>: Ss are asked to understand the general idea. Ss confirm their expectations or predictions made in a pre-listening stage. / <span class='kw1'>Intensive listening phase</span>: Before the second play, the T provide Ss with <span class='kw2'>pre-set Qs</span> to make Ss have an authentic purpose.\"",
   compare:[{title:"<span class='kw1'>Extensive phase</span> (1st)",desc:"<span class='kw2'>general idea</span> · confirm predictions"},{title:"<span class='kw1'>Intensive phase</span> (2nd)",desc:"<span class='kw2'>pre-set Qs</span> · specific info · repeated play"}]},

  {src:"Format of Listening Lesson",cat:"Post-listening",
   text:"<span class='kw1'>Skill integration</span> at the post-listening stage means students listen to the text one more time to consolidate their understanding of linguistic forms.",
   ans:false,
   correct:"<span class='kw1'>Skill integration</span> at post-listening means <span class='kw2'>integrating other skills</span> (speaking, writing, reading) <span class='kw2'>with listening</span>, not re-listening for form.",
   why:"Post-listening 단계에서 <span class='kw1'>skill integration</span>은 듣기를 말하기·쓰기·읽기 등 <span class='kw2'>다른 기능과 통합</span>하는 활동을 의미합니다. 예: 들은 내용을 바탕으로 토론하거나 요약 글쓰기를 하는 것. 기출 포인트로도 출제 가능성이 있습니다.",
   source:"\"<span class='kw1'>Skill-integration</span>: Post-listening stage can involve <span class='kw2'>integration of other skills with listening</span>. / Reflection: Ss can reflect on what they have learned and make plans for next listening.\"",
   compare:[{title:"<span class='kw1'>Skill integration</span>",desc:"listening + <span class='kw2'>speaking/writing/reading</span>"},{title:"<span class='kw1'>Reflection</span>",desc:"학습 내용 되돌아보기 · next listening 계획"}]},

  {src:"Listening Activities",cat:"Product vs Process Oriented",
   text:"<span class='kw1'>Product-oriented listening</span> focuses on <span class='kw2'>how the understanding takes place</span>, guiding students to reflect on their listening process and discuss their thoughts and feelings.",

   correct:"That describes <span class='kw1'>process-oriented listening</span>. <span class='kw1'>Product-oriented listening</span> = '<span class='kw2'>Listen to learn</span>' — using what was comprehended to complete another language activity.",

   source:"\"<span class='kw1'>Product-oriented listening</span>: Focus on what was understood after the fact. Use what Ss comprehended in listening to complete another language activity. / <span class='kw1'>Process-oriented listening</span>: Focus on <span class='kw2'>how the understanding takes place</span>. T guides Ss to go through the listening process and to discuss their thoughts and feelings.\"",
   compare:[{title:"<span class='kw1'>Product-oriented</span>",desc:"'<span class='kw2'>Listen to learn</span>' · 결과 활용 · write/speech"},{title:"<span class='kw1'>Process-oriented</span>",desc:"'<span class='kw2'>Learn to listen</span>' · 과정 초점 · metacognition↑"}]},

   text:"<span class='kw1'>Metacognitive instruction</span> in listening promotes learners' awareness of their own listening process, encouraging self-regulation through strategies such as <span class='kw2'>planning</span>, <span class='kw2'>monitoring</span>, and <span class='kw2'>evaluating</span>.",
   ans:true,
   correct:"<span class='kw1'>Metacognitive instruction</span>은 학습자가 자신의 <span class='kw2'>듣기 과정을 인식</span>하고 <span class='kw2'>self-regulating</span>할 수 있도록 합니다. Planning · Monitoring · Evaluating이 핵심 전략입니다.",
   why:"<span class='kw1'>Metacognitive instruction</span>은 comprehension을 모니터링하고 사후 평가하는 요소를 포함합니다. 교사는 <span class='kw2'>metacognitive strategies</span>(planning, monitoring, evaluating)의 습득을 촉진하고, 학습자가 효율적 전략을 배포하여 <span class='kw2'>consciously intervene</span>할 수 있게 합니다.",

];

let cur=0;
const TOTAL=Q.length;
const SAVE_KEY='ox_listen_v1';
let answers=new Array(TOTAL).fill(null);

function getScore(){return answers.filter(a=>a&&a.correct).length;}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers}));}
function clearProgress(){localStorage.removeItem(SAVE_KEY);}

function freshStart(){
  cur=0;answers=new Array(TOTAL).fill(null);clearProgress();
  document.getElementById('rb').style.display='none';
  document.getElementById('qa').style.display='block';
  renderNav();render();
}

function renderNav(){
  document.getElementById('nav').innerHTML=Array.from({length:TOTAL},(_,i)=>{
    const a=answers[i];
    const cls=i===cur?'nd cur':a===null?'nd':a.correct?'nd ok':'nd ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}

function jumpTo(i){cur=i;render();}

function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`
    <div class="sec-label">📊 비교 정리</div>
    <div class="compare${three?' three':''}">
      ${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}
    </div>`:'';
  return `<div class="exp show">
    <div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div>
    <div class="exp-answer"><div class="ans-label">핵심 정리</div><div class="ans-text">${q.correct}</div></div>
    <div class="exp-body">
      <div class="sec-label">📖 상세 설명</div><p>${q.why}</p>
      <div class="sec-label">📌 Source</div>
      <div class="def-box"><p>${q.source}</p></div>
      ${cmp}
    </div>
  </div>`;
}

function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button>
        </div>
        <div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div>
        <div>${renderExp(q,a.correct)}</div>
        <button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }else{
    document.getElementById('qa').innerHTML=`
      <div class="card">
        <div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="ox-btns">
          <button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button>
          <button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button>
        </div>
        <div id="bd" class="badge"></div>
        <div id="ep"></div>
        <button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button>
      </div>`;
  }
}

function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();
}

function next(){
  cur++;
  if(cur>=TOTAL){clearProgress();}else{saveProgress();}
  render();
}
function restart(){cur=0;answers=new Array(TOTAL).fill(null);clearProgress();document.getElementById('sc').classList.remove('show');document.getElementById('rb').style.display='none';document.getElementById('qa').style.display='block';renderNav();render();}

(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    const done=answers.filter(a=>a!==null).length;
    if(done>0){
      document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;
      document.getElementById('rb').style.display='block';
    }
  }
  renderNav();render();
})();
</script>
<script src="./score-popup.js"></script>
<script src="./sounds.js"></script>
</body>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch.7 Teaching Listening 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232636;
    --accent: #7c6af7;
    --accent2: #4fc3f7;
    --correct: #4caf7d;
    --wrong: #f7706a;
    --text: #e8eaf6;
    --muted: #8b90b0;
    --border: #2e3250;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.9;
  }

  /* ── 헤더 ── */
  .hero {
    background: linear-gradient(135deg, #13152a 0%, #1a1d35 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 24px 40px;
    text-align: center;
  }
  .hero-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(124,106,247,.12);
    border: 1px solid rgba(124,106,247,.3);
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .hero h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .hero p { color: var(--muted); font-size: 13px; }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 22px;
    flex-wrap: wrap;
  }
  .stat-n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent2);
  }
  .stat-l { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── 스코어바 ── */
  .sbar {
    position: sticky;
    top: 0;
    z-index: 99;
    background: #13152a;
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.4);
  }
  .sbar-lbl { font-size: 12px; color: var(--muted); }
  .sbar-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }
  .prog-wrap {
    flex: 1;
    max-width: 180px;
    height: 5px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width .4s;
  }
  .rbtn {
    margin-left: auto;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    background: transparent;
    transition: all .15s;
  }
  .rbtn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 본문 ── */
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ── 문제 카드 ── */
  .qcard {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 24px 26px;
    margin-bottom: 16px;
    transition: border-color .2s;
  }
  .qcard.ok { border-color: var(--correct); }
  .qcard.ng { border-color: var(--wrong); }

  .qmeta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .qnum {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(124,106,247,.12);
    padding: 3px 10px;
    border-radius: 10px;
  }
  .qyear { font-size: 12px; color: var(--muted); }
  .qcat {
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,195,247,.1);
    padding: 3px 10px;
    border-radius: 10px;
    margin-left: auto;
  }

  .qtext {
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text);
    margin-bottom: 18px;
  }
  .qtext .kw {
    color: var(--accent2);
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    font-size: .88em;
  }

  /* ── 보기 버튼 ── */
  .opts { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.65;
    text-align: left;
    width: 100%;
    transition: all .18s;
  }
  .opt:hover:not([disabled]) {
    border-color: var(--accent);
    background: rgba(124,106,247,.08);
    transform: translateX(3px);
  }
  .opt-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(124,106,247,.15);
    width: 24px;
    height: 24px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .opt.ok2 { border-color: var(--correct); background: rgba(76,175,125,.1); }
  .opt.ok2 .opt-lbl { background: var(--correct); color: #fff; }
  .opt.ng2 { border-color: var(--wrong); background: rgba(247,112,106,.1); }
  .opt.ng2 .opt-lbl { background: var(--wrong); color: #fff; }
  .opt:disabled { cursor: default; }

  /* ── 해설 ── */
  .expl {
    display: none;
    margin-top: 16px;
    padding: 14px 18px;
    background: rgba(124,106,247,.06);
    border: 1px solid rgba(124,106,247,.2);
    border-radius: 11px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--muted);
    animation: fadeIn .3s ease;
  }
  .expl.show { display: block; }
  .expl strong {
    color: var(--accent2);
    display: block;
    margin-bottom: 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── 결과 박스 ── */
  .rbox {
    display: none;
    margin-top: 40px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
  }
  .rbox.show { display: block; animation: slideUp .5s ease; }
  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 0 40px rgba(124,106,247,.35);
  }
  .score-circle .sn { font-size: 38px; font-weight: 700; line-height: 1; }
  .score-circle .st { font-size: 13px; opacity: .75; }
  .rbox h2 { font-size: 22px; margin-bottom: 6px; }
  .rbox p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .r-btn {
    padding: 12px 30px;
    background: transparent;
    border: 1.5px solid var(--accent);
    border-radius: 11px;
    color: var(--accent);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .r-btn:hover { background: rgba(124,106,247,.1); }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">임용고시 대비</div>
  <h1>Ch.7 Teaching Listening 퀴즈</h1>
  <p>듣기 지도 핵심 개념 · 기출 출제 포인트 완벽 정리</p>
  <div class="hero-stats">
    <div><div class="stat-n">10</div><div class="stat-l">문제</div></div>
    <div><div class="stat-n">5지선다</div><div class="stat-l">유형</div></div>
    <div><div class="stat-n">기출 포함</div><div class="stat-l">난이도</div></div>
  </div>
</div>

<div class="sbar">
  <span class="sbar-lbl">맞은 문제</span>
  <span class="sbar-num"><span id="sc">0</span>&thinsp;/&thinsp;10</span>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <button class="rbtn" onclick="resetAll()">↺ 다시 풀기</button>
</div>

<div class="wrap">
  <div id="qw"></div>
  <div class="rbox" id="rb">
    <div class="score-circle">
      <span class="sn" id="fscore">0</span>
      <span class="st">/10</span>
    </div>
    <h2 id="rmsg"></h2>
    <p id="rsub"></p>
    <button class="r-btn" onclick="resetAll()">↺ 다시 풀기</button>
  </div>
</div>

<script>
const Q = [
  {
    year:"기본개념", cat:"Bottom-up / Top-down",
    q:"Bottom-up processing과 Top-down processing에 대한 설명으로 <strong>옳지 않은</strong> 것은?",
    o:["① Bottom-up processing은 개별 소리와 단어를 순차적으로 해독하여 의미를 파악하는 방식이다.",
       "② Top-down processing에서 학습자는 배경지식과 맥락을 활용하여 의미를 재구성한다.",
       "③ Interactive processing은 bottom-up과 top-down이 동시에 사용되며, 다양한 학습 스타일에 적합하다.",
       "④ Bottom-up processing 활동의 예로는 global listening strategies를 활용한 의미 파악 활동이 있다.",
       "⑤ Top-down processing 활동은 extralinguistic skills에 의존하는 경향이 있다."],
    a:3,
    e:"④는 Top-down processing에 대한 설명입니다. Bottom-up processing 활동은 form에 초점을 두고 영어의 구조적 시스템을 다루거나, 세부 정보를 청취하는 것처럼 개별적인 언어 요소를 선택하는 활동입니다. Global listening strategies를 활용한 의미 파악은 top-down processing에 해당합니다."
  },
  {
    year:"2012.20 / 2022", cat:"Listening Processing",
    q:"다음 중 <span class='kw'>top-down processing</span>을 활용한 듣기 활동으로 가장 적절한 것은?",
    o:["① 받아쓰기(dictation)를 통해 정확한 발음과 철자를 훈련한다.",
       "② 녹음을 반복 재생하며 특정 문법 구조를 분석하고 연습한다.",
       "③ 제목과 그림을 보고 내용을 예측한 후 들으며 예측이 맞는지 확인한다.",
       "④ 특정 단어와 구문을 집중적으로 듣고 받아 적는 세부 청취 활동을 한다.",
       "⑤ 짧은 구 단위로 끊어 읽어주는 내용을 그대로 따라 말한다."],
    a:2,
    e:"Top-down processing은 배경지식, 상황, 맥락을 활용하여 의미를 재구성하는 방식입니다. 제목과 그림으로 내용을 예측하는 것은 prior knowledge를 활용하는 전형적인 top-down 활동입니다. ①④는 bottom-up, ②⑤는 form에 초점을 둔 활동입니다."
  },
  {
    year:"2013.19", cat:"Pre-listening",
    q:"Pre-listening 단계에서 교사가 학생들에게 제목을 주고 가능한 많은 질문을 스스로 만들게 하는 활동은?",
    o:["① Signposting questions — 학생들을 올바른 방향으로 안내하는 미리 제시된 질문",
       "② Generating questions — 제목을 주고 학생들이 스스로 질문을 만드는 활동",
       "③ Schema activation — 브레인스토밍이나 시각 자료로 배경지식을 활성화",
       "④ Pre-teaching vocabulary — 핵심 어휘를 미리 가르쳐 이해를 돕는 활동",
       "⑤ Establishing context — 듣기 내용과 관련된 맥락 정보를 제공하는 활동"],
    a:1,
    e:"Generating questions는 학생들이 제목을 받고 스스로 최대한 많은 질문을 생성하는 활동으로, 듣기의 목적의식을 높이고 동기를 유발합니다. Signposting questions는 교사가 미리 제시하여 학생들을 올바른 방향으로 안내하는 질문입니다. 두 활동 모두 pre-listening의 동기 유발 기법이지만 누가 질문을 만드느냐가 다릅니다."
  },
  {
    year:"2010.22", cat:"Listening Types",
    q:"<span class='kw'>Selective listening</span>에 대한 설명으로 옳은 것을 모두 고른 것은?<br><br>ㄱ. 사전에 계획된 목적을 가지고 특정 정보를 수집하기 위해 듣는다.<br>ㄴ. Field independent 학습자에게 적합한 활동이다.<br>ㄷ. Intensive listening과 달리 담화가 더 긴 편이다.<br>ㄹ. Scanning과 유사한 특성을 가진다.",
    o:["① ㄱ, ㄴ","② ㄱ, ㄷ","③ ㄴ, ㄹ","④ ㄱ, ㄴ, ㄷ","⑤ ㄱ, ㄴ, ㄷ, ㄹ"],
    a:4,
    e:"Selective listening의 특징: ㄱ. 사전에 계획된 목적을 가지고 특정 정보 수집 (O) ㄴ. Field independent 학습자에게 적합 (O) ㄷ. Intensive listening과 달리 담화가 더 긴 편 (O) ㄹ. Scanning과 유사 (O). 따라서 ㄱㄴㄷㄹ 모두 옳습니다."
  },
  {
    year:"2011.22", cat:"Product vs Process",
    q:"<span class='kw'>Process-oriented listening</span>과 <span class='kw'>Product-oriented listening</span>에 대한 설명으로 <strong>옳지 않은</strong> 것은?",
    o:["① Product-oriented listening은 'Listen to learn'으로, 이해한 내용을 다른 언어 활동에 활용한다.",
       "② Process-oriented listening은 'Learn to listen'으로, 이해가 이루어지는 과정 자체에 초점을 맞춘다.",
       "③ Process-oriented listening은 metacognitive awareness를 향상시키고 자기 조절 능력을 개발하는 데 도움이 된다.",
       "④ Product-oriented listening 수업에서 교사는 학생들이 듣기 과정을 거치도록 안내하고 과정에 대한 생각과 느낌을 토론하게 한다.",
       "⑤ Product-oriented listening은 들은 내용을 보고서 작성이나 발표 등 후속 활동에 연결하는 방식으로 진행될 수 있다."],
    a:3,
    e:"④는 Process-oriented listening에 대한 설명입니다. Process-oriented listening에서 교사는 학생들이 듣기 과정을 거치도록 안내하고, 그 과정에서의 생각과 느낌을 토론하게 합니다. Product-oriented listening은 이해한 결과물(what was understood)에 초점을 두어 그 내용을 다른 활동에 활용합니다."
  },
  {
    year:"기본개념", cat:"Authentic Materials",
    q:"듣기 수업에서 authentic materials 사용 시 <span class='kw'>concocted texts</span>의 문제점으로 가장 적절한 것은?",
    o:["① 학습자의 수준에 비해 너무 어렵기 때문에 이해를 방해한다.",
       "② 실제 영어 사용에 대한 잘못된 기대를 심어주어, 교실 밖 실제 듣기 상황으로의 전이가 어렵다.",
       "③ 문법 구조가 너무 복잡하여 초급 학습자가 이해하기 어렵다.",
       "④ 원어민 화자의 자연스러운 발화 속도를 그대로 유지하기 때문에 부담이 된다.",
       "⑤ 어휘가 너무 단순하여 고급 학습자에게 도전이 되지 않는다."],
    a:1,
    e:"Concocted texts(인위적으로 만들어진 텍스트)의 핵심 문제는 실제 생활에 대한 잘못된 기대(false expectation)를 심어준다는 것입니다. 학생들이 교실에서 배운 것을 교실 밖 실제 듣기 경험(genuine experience outside the classroom)에 전이(transfer)하려 할 때 문제가 발생합니다."
  },
  {
    year:"기본개념", cat:"Dictogloss",
    q:"<span class='kw'>Dictogloss</span>에 대한 설명으로 옳은 것은?",
    o:["① 교사가 짧은 구 단위로 끊어 읽어주면 학습자가 그대로 받아쓰는 활동이다.",
       "② 학습자들이 협력하여 구두로 제시된 텍스트를 재구성하는 협동 활동이다.",
       "③ Bottom-up processing만 활용하여 정확한 언어 형태를 훈련하는 활동이다.",
       "④ 개인 활동으로, 원문의 정확한 복제를 목표로 한다.",
       "⑤ 읽기와 듣기를 통합한 활동으로, 시각적 지원을 필수적으로 제공한다."],
    a:1,
    e:"Dictogloss는 학습자들이 협력하여(collaboratively) 구두로 제시된 텍스트를 재구성(reconstruct)하는 collaborative outcome task입니다. 단계는 ① 준비 → ② 받아쓰기(노트 테이킹) → ③ 재구성 → ④ 분석 및 수정으로 이루어지며, bottom-up과 top-down 전략을 모두 활용합니다. ①은 일반 dictation에 대한 설명입니다."
  },
  {
    year:"2013.19 / 기본", cat:"Listening Strategies",
    q:"While-listening 단계에서 학생들이 핵심 단어를 들으며 받아 적고, 스크립트와 비교하여 자신이 들은 것과 원문 사이의 차이를 인식한 후, 이를 말하기에 적용하는 활동은?",
    o:["① Predicting — 들을 내용을 미리 예측하여 스키마를 활성화하는 전략",
       "② Monitoring — 들으면서 자신의 이해 여부를 확인하고 예측을 검증하는 전략",
       "③ Notice the gap — 들은 것과 원문 스크립트를 비교하여 차이를 인식하는 전략",
       "④ Inferencing — 불완전한 정보를 바탕으로 행간의 의미를 추론하는 전략",
       "⑤ Evaluating — 사후 단계에서 자신의 이해도를 점검하는 전략"],
    a:2,
    e:"Notice the gap은 학생들이 핵심 단어를 들으며 메모(while-listening) → 스크립트와 비교 → 자신이 들은 것과 원문 스크립트 사이의 gap(차이)을 인식 → 이를 말하기에 적용(reconstructing activity)하는 전략입니다. (2013.19 기출 포인트)"
  },
  {
    year:"기본개념", cat:"Authentic Materials 전략",
    q:"Authentic materials를 듣기 수업에 활용할 때, 언어 자체를 단순화하는 대신 <strong>학습자에게 요구되는 과제를 단순화</strong>하는 전략은?",
    o:["① Grading the texts — 접근성이 높은 것부터 고급 순으로 텍스트를 배열하는 전략",
       "② Staging the listening — 점진적으로 이해를 쌓아가도록 활동을 구성하는 전략",
       "③ Simplifying the tasks — 언어 대신 과제를 단순화하여 자신감과 동기를 높이는 전략",
       "④ Pre-teaching vocabulary — 핵심 어휘를 사전에 지도하여 이해를 촉진하는 전략",
       "⑤ Finely-tuned input — 학습자 수준에 맞게 구조와 어휘를 통제한 입력을 제공하는 전략"],
    a:2,
    e:"Simplifying the tasks는 authentic material의 언어(input)를 단순화하는 것이 아니라, 학습자에게 요구하는 과제(task)를 단순화하는 전략입니다. 이를 통해 학습자는 자신감을 키우고 동기 부여가 됩니다. Grading the texts는 텍스트를 난이도 순으로 배열하고, Staging the listening은 점진적 이해를 위한 활동 구성입니다."
  },
  {
    year:"기본개념", cat:"Metacognition",
    q:"다음 중 <span class='kw'>metacognitive strategy</span>에 해당하는 듣기 전략을 모두 고른 것은?<br><br>ㄱ. Predicting — 들을 내용을 미리 예측<br>ㄴ. Monitoring — 들으면서 이해 여부 확인<br>ㄷ. Note-taking — 중요 정보를 선택적으로 기록<br>ㄹ. Evaluating — 사후에 이해도 점검<br>ㅁ. Inferencing — 불완전 정보로 의미 추론",
    o:["① ㄱ, ㄴ, ㄹ","② ㄱ, ㄴ, ㄷ, ㄹ","③ ㄴ, ㄷ, ㄹ, ㅁ","④ ㄱ, ㄴ, ㄹ, ㅁ","⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"],
    a:0,
    e:"Metacognitive strategies는 학습의 계획(planning), 모니터링(monitoring), 평가(evaluating)와 관련된 고차원 전략입니다. ㄱ. Predicting(계획/준비) ✅ ㄴ. Monitoring(들으면서 이해 확인) ✅ ㄹ. Evaluating(사후 점검) ✅ — 이 세 가지가 핵심입니다. ㄷ. Note-taking은 cognitive strategy이고, ㅁ. Inferencing도 cognitive strategy에 해당합니다."
  }
];

let ANS, COR;

function build() {
  ANS = new Array(Q.length).fill(false);
  COR = 0;
  document.getElementById('sc').textContent = 0;
  document.getElementById('prog').style.width = '0%';
  document.getElementById('rb').classList.remove('show');

  const wrap = document.getElementById('qw');
  wrap.innerHTML = '';

  Q.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'qcard';
    card.id = 'qc' + i;
    card.innerHTML = `
      <div class="qmeta">
        <span class="qnum">Q${i+1}</span>
        <span class="qyear">${q.year}</span>
        <span class="qcat">${q.cat}</span>
      </div>
      <div class="qtext">${q.q}</div>
      <div class="opts">${q.o.map((o,j) =>
        `<button class="opt" id="b${i}_${j}" onclick="pick(${i},${j})">
          <span class="opt-lbl">${['①','②','③','④','⑤'][j]}</span>
          <span>${o.replace(/^[①-⑤]\s*/,'')}</span>
        </button>`
      ).join('')}</div>
      <div class="expl" id="ex${i}"><strong>💡 해설</strong>${q.e}</div>`;
    wrap.appendChild(card);
  });
}

function pick(i, j) {
  if (ANS[i]) return;
  ANS[i] = true;
  const ok = j === Q[i].a;
  if (ok) COR++;

  Q[i].o.forEach((_,k) => {
    const b = document.getElementById(`b${i}_${k}`);
    b.disabled = true;
    if (k === Q[i].a) b.classList.add('ok2');
    else if (k === j && !ok) b.classList.add('ng2');
  });

  document.getElementById('ex'+i).classList.add('show');
  document.getElementById('qc'+i).classList.add(ok ? 'ok' : 'ng');

  const done = ANS.filter(Boolean).length;
  document.getElementById('sc').textContent = COR;
  document.getElementById('prog').style.width = (done / Q.length * 100) + '%';

  if (ANS.every(a => a)) showResult();
}

function showResult() {
  const pct = COR / Q.length;
  const rb = document.getElementById('rb');
  rb.classList.add('show');
  document.getElementById('fscore').textContent = COR;
  document.getElementById('rmsg').textContent =
    pct === 1 ? '🎉 완벽합니다!' : pct >= .8 ? '👏 훌륭해요!' : pct >= .6 ? '😊 잘 하셨어요!' : '💪 다시 도전해보세요!';
  document.getElementById('rsub').textContent =
    `10문제 중 ${COR}문제 정답 (${Math.round(pct*100)}%)`;
  rb.scrollIntoView({behavior:'smooth'});
}

function resetAll() {
  build();
  window.scrollTo({top:0, behavior:'smooth'});
}

build();
</script>
